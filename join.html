<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팜마을 - 회원가입</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', -apple-system, sans-serif; }
        body { background-color: #f9fbf9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        /* 🌟 박스 내부 상하 여백 축소 (40px -> 25px) */
        .register-container { background: white; padding: 25px 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
        
        /* 🌟 카카오 버튼 여백 축소 */
        .btn-kakao-login { display: block; width: 100%; background: #FEE500; color: #3C1E1E; text-align: center; padding: 12px; border-radius: 8px; font-weight: 800; font-size: 1.1rem; text-decoration: none; margin-bottom: 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-kakao-login:hover { background: #e5cd00; }
        
        /* 🌟 구분선 여백 축소 */
        .divider { display: flex; align-items: center; text-align: center; color: #999; font-size: 0.95rem; font-weight: 800; margin-bottom: 18px; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #eaeaea; }
        .divider:not(:empty)::before { margin-right: 15px; }
        .divider:not(:empty)::after { margin-left: 15px; }

        /* 🌟 안내 상자 여백 축소 */
        .info-box { background: #e8f5e9; border: 1px solid #c8e6c9; border-radius: 8px; padding: 12px 10px; text-align: center; color: #2e7d32; font-weight: 800; font-size: 0.95rem; margin-bottom: 18px; line-height: 1.4; }

        /* 🌟 입력칸 간격 및 내부 여백 축소 */
        .input-group { margin-bottom: 10px; position: relative; }
        .input-group input { width: 100%; padding: 12px; padding-right: 40px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; outline: none; color: #333; }
        .input-group input::placeholder { color: #aaa; font-weight: 600; }
        .input-group input:focus { border-color: #87B32E; }

        /* 👁️ 비밀번호 눈동자 토글 버튼 스타일 (그대로 유지) */
        .password-toggle { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 1.2rem; color: #999; cursor: pointer; user-select: none; }

        /* 🌟 하단 체크박스 구역 여백 축소 */
        .terms-group { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; font-size: 0.9rem; color: #555; font-weight: 800; }
        .terms-group input[type="checkbox"] { width: 18px; height: 18px; accent-color: #87B32E; cursor: pointer; }
        .terms-group a { color: #4B9AD2; text-decoration: none; }
        
        /* 🌟 최종 회원가입 버튼 여백 축소 */
        .btn-submit { width: 100%; background: #87B32E; color: white; border: none; padding: 13px; border-radius: 8px; font-size: 1.15rem; font-weight: 800; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-submit:hover { background: #719626; }
    </style>
</head>
<body>

    <div class="register-container">
        <a href="https://kauth.kakao.com/oauth/authorize?client_id=e2676a110b5565e56d2863dd7a9581c8&redirect_uri=https://farmaul.com/auth/kakao/callback&response_type=code" class="btn-kakao-login">💬 카카오로 간편 가입하기</a>
        
        <div class="divider">또는 이메일로 가입하기</div>

        <div class="info-box">
            🌱 한 번의 가입으로 구매, 생산자 등록, HUB 신청까지<br>팜마을의 모든 서비스를 자유롭게 이용하실 수 있습니다.
        </div>

        <form id="registerForm">
            <div class="input-group">
                <input type="text" id="regName" placeholder="이름 (실명)" required>
            </div>
            <div class="input-group">
                <input type="email" id="regEmail" placeholder="이메일 주소 (아이디로 사용)" required>
            </div>
            <div class="input-group">
                <input type="password" id="regPassword" placeholder="비밀번호 (영문, 숫자 포함 8자 이상)" required>
                <span class="password-toggle" onclick="togglePass('regPassword', this)">👁️</span>
            </div>
            <div class="input-group">
                <input type="password" id="regPasswordConfirm" placeholder="비밀번호 확인" required>
                <span class="password-toggle" onclick="togglePass('regPasswordConfirm', this)">👁️</span>
            </div>
            <div class="input-group">
                <label>휴대폰 번호</label>
                <input type="tel" id="userPhone" placeholder="휴대폰 번호 (- 없이 입력)" required>
            </div>
            
            <div class="terms-group">
                <input type="checkbox" id="terms" required>
                <label for="terms">팜마을 <a href="policy.html">이용약관</a> 및 <a href="policy.html">개인정보처리방침</a>에 동의합니다. (필수)</label>
            </div>

            <button type="submit" class="btn-submit">회원가입 완료</button>
        </form>
    </div>

    <script>
        // 👁️ 비밀번호 보이기/숨기기 토글 스크립트 (기존 기능 그대로 유지)
        function togglePass(inputId, toggleIcon) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                toggleIcon.style.color = "#87B32E"; // 보일 때는 녹색으로 강조
            } else {
                input.type = "password";
                toggleIcon.style.color = "#999";
            }
        }

        // 🌟 진짜 서버 데이터베이스에 이메일 가입 요청 전송 (기존 기능 그대로 유지)
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const passwordConfirm = document.getElementById('regPasswordConfirm').value;

            if (password !== passwordConfirm) {
                alert('비밀번호와 비밀번호 확인이 서로 일치하지 않습니다.');
                return;
            }

           fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // 🌟 body 부분에 phone 데이터를 직접 가져와서 추가해 줍니다.
                body: JSON.stringify({ 
                    name, 
                    email, 
                    password, 
                    phone: document.getElementById('userPhone').value 
                })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                if (data.success) {
                    location.href = 'login.html'; // 가입 완료 시 로그인 창으로 안전 이동
                }
            })
            .catch(err => alert('서버 통신 오류가 발생했습니다.'));
        });
    </script>
</body>
</html>
