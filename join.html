<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팜마을 - 회원가입</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', -apple-system, sans-serif; }
        body { background-color: #f9fbf9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        /* 캡처본과 똑같은 하얀색 상자 디자인 */
        .register-container { background: white; padding: 40px 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
        
        /* 카카오 가입 노란색 버튼 */
        .btn-kakao-login { display: block; width: 100%; background: #FEE500; color: #3C1E1E; text-align: center; padding: 15px; border-radius: 8px; font-weight: 800; font-size: 1.1rem; text-decoration: none; margin-bottom: 25px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-kakao-login:hover { background: #e5cd00; }
        
        /* 가운데 '또는 이메일로 가입하기' 선 */
        .divider { display: flex; align-items: center; text-align: center; color: #999; font-size: 0.95rem; font-weight: 800; margin-bottom: 25px; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #eaeaea; }
        .divider:not(:empty)::before { margin-right: 15px; }
        .divider:not(:empty)::after { margin-left: 15px; }

        /* 연한 초록색 안내 상자 */
        .info-box { background: #e8f5e9; border: 1px solid #c8e6c9; border-radius: 8px; padding: 18px 15px; text-align: center; color: #2e7d32; font-weight: 800; font-size: 0.95rem; margin-bottom: 25px; line-height: 1.5; }

        /* 입력칸 디자인 */
        .input-group { margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; outline: none; color: #333; }
        .input-group input::placeholder { color: #aaa; font-weight: 600; }
        .input-group input:focus { border-color: #87B32E; }

        /* 하단 체크박스 구역 */
        .terms-group { display: flex; align-items: center; gap: 8px; margin-bottom: 25px; font-size: 0.9rem; color: #555; font-weight: 800; }
        .terms-group input[type="checkbox"] { width: 18px; height: 18px; accent-color: #87B32E; cursor: pointer; }
        .terms-group a { color: #4B9AD2; text-decoration: none; }
        .terms-group a:hover { text-decoration: underline; }
        
        /* 최종 회원가입 버튼 */
        .btn-submit { width: 100%; background: #87B32E; color: white; border: none; padding: 16px; border-radius: 8px; font-size: 1.15rem; font-weight: 800; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-submit:hover { background: #719626; }
    </style>
</head>
<body>

    <div class="register-container">
        <a href="https://kauth.kakao.com/oauth/authorize?client_id=e2676a110b5565e56d2863dd7a9581c8&redirect_uri=https://farmmaul.com/auth/kakao/callback&response_type=code" class="btn-kakao-login">💬 카카오로 간편 가입하기</a>
        
        <div class="divider">또는 이메일로 가입하기</div>

        <div class="info-box">
            🌱 한 번의 가입으로 구매, 생산자 등록, HUB 신청까지<br>팜마을의 모든 서비스를 자유롭게 이용하실 수 있습니다.
        </div>

        <form id="registerForm">
            <div class="input-group">
                <input type="text" placeholder="이름 (실명)" required>
            </div>
            <div class="input-group">
                <input type="email" placeholder="이메일 주소 (아이디로 사용)" required>
            </div>
            <div class="input-group">
                <input type="password" placeholder="비밀번호 (영문, 숫자 포함 8자 이상)" required>
            </div>
            <div class="input-group">
                <input type="password" placeholder="비밀번호 확인" required>
            </div>
            
            <div class="terms-group">
                <input type="checkbox" id="terms" required>
                <label for="terms">팜마을 <a href="policy.html">이용약관</a> 및 <a href="policy.html">개인정보처리방침</a>에 동의합니다. (필수)</label>
            </div>

            <button type="submit" class="btn-submit">회원가입 완료</button>
        </form>
    </div>

    <script>
        // 이메일로 회원가입 폼을 제출했을 때 자동으로 메인화면으로 넘겨줍니다!
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            alert('팜마을 회원가입이 성공적으로 완료되었습니다! 환영합니다 🌱');
            location.href = 'index.html'; // 완료 후 메인 홈페이지로 이동
        });
    </script>
</body>
</html>
