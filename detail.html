<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>팜마을 - 구매자 상품 상세페이지</title>
    <style>
        :root { --primary-green: #87B32E; --primary-orange: #E69138; --primary-blue: #4B9AD2; --bg-color: #f8f9fa; }
        body { font-family: 'Pretendard', sans-serif; background: #ffffff; margin: 0; padding: 0; color: #333; }
        
        /* 공통 헤더 */
        .header { border-bottom: 1px solid #eee; position: sticky; top: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(5px); z-index: 100; }
        .header-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .header .btn { font-size: 1.2rem; text-decoration: none; color: #333; font-weight: 900; cursor: pointer; }
        .header .title { font-weight: 900; font-size: 1.3rem; color: var(--primary-green); }

        /* 반응형 레이아웃 뼈대 */
        .top-section { max-width: 1200px; margin: 0 auto; display: flex; gap: 60px; padding: 50px 20px; align-items: flex-start; }
        .img-area { width: 500px; flex-shrink: 0; display: flex; flex-direction: column; gap: 20px; position: sticky; top: 100px; }
        
        /* 🌟 우측 정보 영역 레이아웃 재설계 */
        .info-area { flex: 1; display: flex; flex-direction: column; width: 100%; gap: 25px; }
        .bottom-section { max-width: 1200px; margin: 0 auto; padding: 0 20px 80px; border-top: 1px solid #eee; padding-top: 40px; }

        /* 사진 및 영상 */
        .main-image { width: 100%; aspect-ratio: 1/1; background: #eee; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .main-image img { width: 100%; height: 100%; object-fit: cover; }
        .youtube-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* 🌟 구역 1: 타이틀 영역 */
        .product-header-section { border-bottom: 2px solid #222; padding-bottom: 20px; position: relative; }
        .farm-badge { display: inline-block; background: #e8f5e9; color: #2e7d32; padding: 6px 12px; border-radius: 6px; font-size: 1rem; font-weight: 800; margin-bottom: 12px; }
        .prod-title { font-size: 2.2rem; font-weight: 900; color: #222; line-height: 1.35; margin: 0 0 15px; word-break: keep-all; }
        
        .certs { display: flex; gap: 6px; margin-bottom: 15px; flex-wrap: wrap; }
        .cert-fixed { background: var(--primary-green); color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 0.85rem; font-weight: 800; }
        .cert-custom { background: var(--primary-blue); color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 0.85rem; font-weight: 800; }
        
        .tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .tags span { color: var(--primary-blue); background: #f0f8ff; padding: 6px 12px; border-radius: 20px; font-size: 0.95rem; font-weight: 800; }

        .owner-btns { position: absolute; top: 0; right: 0; display: flex; gap: 8px; }
        .owner-btns button { padding: 5px 12px; border-radius: 6px; font-weight: 800; cursor: pointer; border: 1px solid; background: #fff; }

        /* 🌟 구역 2: 가격 영역 */
        .price-section { display: flex; flex-direction: column; gap: 5px; }
        .org-price { font-size: 1.25rem; font-weight: 600; color: #999; text-decoration: line-through; display: none; } /* 기본 숨김 */
        .sale-price-wrap { display: flex; align-items: baseline; gap: 10px; }
        .discount { font-size: 2.4rem; font-weight: 900; color: #ff5e62; display: none; } /* 기본 숨김 */
        .sale-price { font-size: 2.6rem; font-weight: 900; color: #111; }
        .unit-text { font-size: 1.3rem; font-weight: 700; color: #555; }

        /* 🌟 구역 3: 상품 정보 요약 표 */
        .info-table-box { background: #f8f9fa; border-radius: 12px; padding: 25px; border: 1px solid #eaeaea; display: flex; flex-direction: column; gap: 15px; }
        .info-row { display: flex; align-items: center; font-size: 1.1rem; }
        .s-label { width: 120px; color: #777; font-weight: 800; }
        .s-value { flex: 1; color: #222; font-weight: 900; }

        /* 🌟 구역 4: 수령 방식 선택 (디자인 정리) */
        .option-section { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 25px; }
        .option-title { font-size: 1.2rem; font-weight: 900; margin-bottom: 15px; color: #222; display: flex; justify-content: space-between; }
        .radio-group { display: flex; flex-direction: column; gap: 12px; }
        .radio-label { position: relative; display: block; cursor: pointer; }
        .radio-label input[type="radio"] { position: absolute; opacity: 0; }
        .radio-box { border: 2px solid #eee; border-radius: 12px; padding: 15px; background: #fafafa; transition: 0.2s; display: flex; gap: 15px; align-items: flex-start; }
        
        .radio-label input[type="radio"]:checked + .radio-box { border-color: var(--primary-orange); background: #fff8eb; }
        .radio-icon { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #ccc; background: #fff; display: flex; justify-content: center; align-items: center; margin-top: 2px; flex-shrink: 0; }
        .radio-label input[type="radio"]:checked + .radio-box .radio-icon { border-color: var(--primary-orange); }
        .radio-label input[type="radio"]:checked + .radio-box .radio-icon::after { content: ''; width: 12px; height: 12px; background: var(--primary-orange); border-radius: 50%; }
        
        .radio-text { flex: 1; }
        .radio-title { font-weight: 900; font-size: 1.1rem; color: #333; margin-bottom: 4px; }
        .radio-desc { font-size: 0.95rem; color: #666; word-break: keep-all; }
        .hub-select { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; font-weight: 700; color: #333; outline: none; }

        /* 지도 안내 박스 */
        .map-section { margin-top: 20px; padding: 20px; background: #f1f3f5; border-radius: 10px; border: 1px solid #e2e8f0; }
        .map-info-title { font-weight: 900; font-size: 1rem; color: #2d3748; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
        .map-placeholder { width: 100%; height: 180px; background: #cbd5e0; border-radius: 8px; overflow: hidden; }

        /* 🌟 구역 5: 액션 버튼 (장바구니/구매) */
        .action-buttons { display: flex; gap: 15px; margin-top: 10px; }
        .btn-icon { width: 65px; height: 65px; border: 1px solid #ddd; border-radius: 12px; font-size: 1.8rem; background: #fff; cursor: pointer; color: #ff5e62; display: flex; justify-content: center; align-items: center; transition: 0.2s; flex-shrink: 0; }
        .btn-icon:hover { background: #fff0f1; border-color: #ff5e62; }
        .btn-cart { flex: 1; height: 65px; background: #f1f3f5; color: #333; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-cart:hover { background: #e9ecef; }
        .btn-buy { flex: 1.5; height: 65px; background: var(--primary-green); color: #fff; border: none; border-radius: 12px; font-size: 1.25rem; font-weight: 900; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(135,179,46,0.3); }
        .btn-buy:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(135,179,46,0.4); }

        /* 상세 설명 섹션 */
        .sec-title { font-size: 1.6rem; font-weight: 900; margin-bottom: 25px; color: #222; border-bottom: 3px solid #222; padding-bottom: 10px; display: table; }
        .detail-block { margin-bottom: 50px; }
        .detail-img { width: 100%; max-width: 800px; border-radius: 15px; margin-bottom: 20px; display: block; }
        .detail-text { font-size: 1.15rem; line-height: 1.8; color: #444; font-weight: 600; max-width: 800px; white-space: pre-wrap; background: #f9f9f9; padding: 25px; border-radius: 15px; }

        /* FAQ 섹션 */
        .faq-item { background: #f8f9fa; border-radius: 12px; margin-bottom: 15px; padding: 20px; border: 1px solid #eee; }
        .faq-q { font-weight: 900; font-size: 1.1rem; color: #222; margin-bottom: 10px; display: flex; gap: 8px; }
        .faq-q::before { content: 'Q.'; color: var(--primary-orange); }
        .faq-a { font-size: 1rem; color: #555; line-height: 1.6; display: flex; gap: 8px; padding-top: 10px; border-top: 1px dashed #ddd; }
        .faq-a::before { content: 'A.'; color: var(--primary-blue); font-weight: 900; }

        /* AI 채팅 팝업 및 플로팅 버튼 */
        .ai-chat-window { position: fixed; bottom: 100px; right: 30px; width: 350px; height: 500px; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: none; flex-direction: column; z-index: 2000; overflow: hidden; border: 1px solid #eee; }
        .ai-chat-header { background: var(--primary-green); color: #fff; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .ai-chat-header h3 { margin: 0; font-size: 1.1rem; font-weight: 900; }
        .ai-chat-body { flex: 1; padding: 20px; background: #f9f9f9; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .ai-msg { background: #fff; padding: 12px 15px; border-radius: 0 15px 15px 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 0.95rem; line-height: 1.5; align-self: flex-start; max-width: 85%; border: 1px solid #eee; }
        .ai-chat-footer { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; background: #fff; }
        .ai-chat-input { flex: 1; border: 1px solid #ddd; padding: 10px 15px; border-radius: 20px; outline: none; font-size: 0.9rem; }
        .ai-chat-send { background: var(--primary-green); color: #fff; border: none; padding: 8px 15px; border-radius: 15px; font-weight: 800; cursor: pointer; }

        .ai-fab { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: var(--primary-green); color: #fff; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 5px 20px rgba(135,179,46,0.4); cursor: pointer; z-index: 1999; transition: 0.3s; }
        .ai-fab:hover { transform: scale(1.1); rotate: 10deg; }
        .ai-fab .icon { font-size: 1.6rem; }
        .ai-fab .text { font-size: 0.7rem; font-weight: 900; }

        /* 모바일 반응형 */
        @media (max-width: 768px) {
            .top-section { flex-direction: column; gap: 25px; padding: 20px; }
            .img-area { width: 100%; position: static; }
            .info-area { gap: 20px; }
            .bottom-section { padding: 20px 20px 100px; }
            
            .prod-title { font-size: 1.8rem; }
            .discount { font-size: 2rem; }
            .sale-price { font-size: 2.2rem; }
            
            .action-buttons { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 20px; background: #fff; box-shadow: 0 -5px 20px rgba(0,0,0,0.08); z-index: 1000; box-sizing: border-box; margin: 0; border-top: 1px solid #eee; }
            
            .ai-chat-window { width: calc(100% - 40px); right: 20px; bottom: 90px; height: 70vh; }
            .ai-fab { bottom: 95px; right: 15px; width: 60px; height: 60px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-inner">
            <a href="#" class="btn" onclick="history.back()">←</a>
            <div class="title">팜마을 상품안내</div>
            <a href="#" class="btn" onclick="alert('상품이 공유되었습니다.')">🔗</a>
        </div>
    </div>

    <div class="top-section">
        <div class="img-area">
            <div class="main-image">
                <img src="https://via.placeholder.com/800x800/87B32E/ffffff?text=Main+Product+Image" alt="메인 사진">
            </div>
            <!-- 유튜브 영상 -->
            <div class="youtube-box" style="display: none;">
                <iframe width="100%" height="100%" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </div>

        <!-- 🌟 새롭게 정돈된 우측 정보 영역 레이아웃 -->
        <div class="info-area">
            
            <!-- 1. 타이틀 구역 -->
            <div class="product-header-section">
                <div class="farm-badge">🧑‍🌾 <span class="farm-name">지산동 영진농원</span></div>
                <div id="ownerActionBtns" class="owner-btns" style="display: none;">
                    <button onclick="editProduct()" style="color: #4B9AD2; border-color: #4B9AD2;">수정</button>
                    <button onclick="deleteProduct()" style="color: #ff5e62; border-color: #ff5e62;">삭제</button>
                </div>
                
                <div class="certs">
                    <span class="cert-fixed category-badge">농산물</span>
                </div>
                
                <h1 class="prod-title">당일 수확 고당도 지산동 꿀토마토 2kg</h1>
                
                <div class="tags">
                    <span>#당일수확</span><span>#무농약</span>
                </div>
            </div>

            <!-- 2. 가격 구역 -->
            <div class="price-section">
                <div class="org-price">20,000원</div>
                <div class="sale-price-wrap">
                    <span class="discount">30%</span>
                    <span class="sale-price">14,000</span><span class="unit-text">원 / 박스</span>
                </div>
            </div>

            <!-- 3. 핵심 정보 표 -->
            <div class="info-table-box">
                <div class="info-row"><div class="s-label">상품 등급</div><div class="s-value s-grade">정보없음</div></div>
                <div class="info-row"><div class="s-label">상품 크기</div><div class="s-value s-size">정보없음</div></div>
                <div class="info-row"><div class="s-label">생산 일자</div><div class="s-value s-date">-</div></div>
            </div>

            <!-- 4. 수령 옵션 선택 구역 -->
            <div class="option-section">
                <div class="option-title">
                    수령 방법 선택 <span style="font-size:0.85rem; color:#ff5e62; font-weight:700;">(필수)</span>
                </div>
                
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="d_option" value="방문수거" checked onchange="updateMap()">
                        <div class="radio-box">
                            <div class="radio-icon"></div>
                            <div class="radio-text">
                                <div class="radio-title">🏠 농장 직접 방문수거</div>
                                <div class="radio-desc">농장으로 직접 찾아가 신선하게 수령하세요.</div>
                            </div>
                        </div>
                    </label>

                    <label class="radio-label">
                        <input type="radio" name="d_option" value="HUB보관" onchange="updateMap()">
                        <div class="radio-box">
                            <div class="radio-icon"></div>
                            <div class="radio-text">
                                <div class="radio-title">🏪 마을 HUB 보관 수령</div>
                                <div class="radio-desc">우리 동네 지정 보관소에서 언제든 찾아가세요.</div>
                                <select class="hub-select" id="selectedHub" onchange="updateMap()">
                                    <option value="지산동 1호 카페 HUB">지산동 1호 카페 HUB</option>
                                    <option value="송탄역 2호 편의점 HUB">송탄역 2호 편의점 HUB</option>
                                </select>
                            </div>
                        </div>
                    </label>

                    <label class="radio-label">
                        <input type="radio" name="d_option" value="택배배송" onchange="updateMap()">
                        <div class="radio-box">
                            <div class="radio-icon"></div>
                            <div class="radio-text">
                                <div class="radio-title">📦 일반 택배 배송</div>
                                <div class="radio-desc">집 앞까지 안전하게 배송됩니다.</div>
                            </div>
                        </div>
                    </label>
                </div>

                <div id="mapGuideArea" class="map-section">
                    <div id="mapInfoTitle" class="map-info-title">📍 방문 장소 확인</div>
                    <div id="mapAddress" style="font-size:0.95rem; color:#666; margin-bottom:15px; font-weight: 700;">장소를 불러오는 중...</div>
                    <div class="map-placeholder"></div>
                </div>
            </div>

            <!-- 5. 액션 버튼 (PC 전용 노출, 모바일은 하단 픽스) -->
            <div class="action-buttons">
                <button class="btn-icon" onclick="alert('찜 💖')">♥</button>
                <button class="btn-cart" onclick="addToCart()">장바구니</button>
                <button class="btn-buy" onclick="processBuy()">바로 구매하기</button>
            </div>
            
        </div>
    </div>

    <!-- 하단 상세 설명 및 FAQ -->
    <div class="bottom-section">
        
        <h2 class="sec-title">📝 상품 상세 설명</h2>
        <!-- 이 곳에 데이터베이스 이미지가 들어갑니다 -->
        
        <h2 class="sec-title faq-section-title" style="margin-top: 50px;">❓ 자주 묻는 질문 (FAQ)</h2>
        <!-- 이 곳에 FAQ가 들어갑니다 -->
    </div>

    <!-- AI 팝업 -->
   <div id="aiChatWindow" class="ai-chat-window">
        <div class="ai-chat-header">
            <h3>🤖 팜마을 AI 고객센터</h3>
            <span onclick="toggleAIChat()" style="cursor:pointer; font-size: 1.5rem;">×</span>
        </div>
        <div class="ai-chat-body">
            <div class="ai-msg">
                안녕하세요! 팜마을 AI 상담원입니다. 🌿<br>
                <b id="aiGreetingTarget">상품 정보</b>에 대해 궁금하신 점이 있으신가요?
            </div>
        </div>
        <div class="ai-chat-footer">
            <input type="text" id="aiChatInput" class="ai-chat-input" placeholder="궁금한 점을 물어보세요..." onkeypress="if(event.key==='Enter') sendAiChat()">
            <button class="ai-chat-send" onclick="sendAiChat()">전송</button>
        </div>
    </div>

    <div class="ai-fab" onclick="toggleAIChat()">
        <span class="icon">🤖</span>
        <span class="text">AI상담</span>
    </div>

    <!-- 스크립트 영역 (기존 기능 100% 동일, 클래스 이름만 연동되도록 수정) -->
    <script>
        function toggleAIChat() {
            const win = document.getElementById('aiChatWindow');
            win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
        }

        let currentFarmAddress = '경기도 평택시 지산동 123-4'; // 기본값

        function updateMap() {
            const option = document.querySelector('input[name="d_option"]:checked').value;
            const mapArea = document.getElementById('mapGuideArea');
            const mapTitle = document.getElementById('mapInfoTitle');
            const mapAddr = document.getElementById('mapAddress');
            const mapPlaceholder = document.querySelector('.map-placeholder');

            if(option === '방문수거') {
                mapArea.style.display = 'block';
                mapTitle.innerHTML = '📍 방문 장소 확인';
                mapAddr.innerText = currentFarmAddress;
                mapPlaceholder.innerHTML = `<iframe src="https://maps.google.com/maps?q=${encodeURIComponent(currentFarmAddress)}&t=&z=16&ie=UTF8&iwloc=&output=embed" width="100%" height="100%" frameborder="0" style="border:0;"></iframe>`;
            } else if(option === 'HUB보관') {
                mapArea.style.display = 'block';
                const hub = document.getElementById('selectedHub').value;
                mapTitle.innerHTML = `📍 ${hub} 위치 확인`;
                let addr = hub.includes('1호 카페') ? '경기도 평택시 지산동 55-1' : '경기도 평택시 지산동 793';
                mapAddr.innerText = addr;
                mapPlaceholder.innerHTML = `<iframe src="https://maps.google.com/maps?q=${encodeURIComponent(addr)}&t=&z=16&ie=UTF8&iwloc=&output=embed" width="100%" height="100%" frameborder="0" style="border:0;"></iframe>`;
            } else {
                mapArea.style.display = 'none';
            }
        }

        function addToCart() {
            const title = document.querySelector('.prod-title').innerText;
            const option = document.querySelector('input[name="d_option"]:checked').value;
            let hubDetail = option === 'HUB보관' ? ' - ' + document.getElementById('selectedHub').value : '';
            const realPrice = parseInt(document.querySelector('.sale-price').innerText.replace(/,/g, ''));

            localStorage.setItem('myCartItem', JSON.stringify({ name: title, price: realPrice, delivery: option + hubDetail }));

            if(confirm('장바구니에 상품을 안전하게 담았습니다! 🛒\n장바구니 화면으로 이동하시겠습니까?')) {
                location.href = 'cart.html';
            }
        }

        function processBuy() {
            const opt = document.querySelector('input[name="d_option"]:checked').value;
            let msg = `[${opt}] 방식을 선택하셨습니다.\n`;
            if(opt === 'HUB보관') msg += `선택 HUB: ${document.getElementById('selectedHub').value}\n`;
            alert(msg + "\n주문서 작성 페이지로 이동합니다! 🚀");
            location.href = 'checkout.html';
        }

        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (productId) {
                fetch('/api/products/' + productId)
                .then(response => response.json())
                .then(result => {
                    if (result.success) {
                        const p = result.data;
                        
                        // 🌟 버튼 노출 권한 처리
                        const btnArea = document.getElementById('ownerActionBtns');
                        if (btnArea && (result.isAdmin || (result.currentUser && p.owner_nickname === result.currentUser))) {
                            btnArea.style.display = 'flex';
                        }

                        // 🌟 타이틀 및 기본 정보 연동
                        document.querySelector('.prod-title').innerText = p.title;
                        document.querySelector('.sale-price').innerText = Number(p.sale_price).toLocaleString();
                        document.querySelector('.farm-name').innerText = p.farm_name || '팜마을 생산자';
                        
                        const aiTarget = document.getElementById('aiGreetingTarget');
                        if(aiTarget) aiTarget.innerText = (p.farm_name || '') + ' ' + p.title;

                        // 🌟 가격 연동 (할인율 계산 포함)
                        const orgPriceEl = document.querySelector('.org-price');
                        const discEl = document.querySelector('.discount');
                        if (p.org_price && p.org_price > p.sale_price) {
                            orgPriceEl.innerText = Number(p.org_price).toLocaleString() + '원';
                            discEl.innerText = Math.round(((p.org_price - p.sale_price) / p.org_price) * 100) + '%';
                            orgPriceEl.style.display = 'block';
                            discEl.style.display = 'inline';
                        }

                        // 🌟 메인 사진 및 유튜브 영상 연동
                        if (p.image) document.querySelector('.main-image img').src = p.image;
                        const youtubeBox = document.querySelector('.youtube-box');
                        if (p.youtube_url) {
                            youtubeBox.style.display = 'block';
                            youtubeBox.querySelector('iframe').src = p.youtube_url;
                        }

                        // 🌟 카테고리, 태그, 품질인증 표기
                        document.querySelector('.category-badge').innerText = p.category || '농산물';
                        const certsContainer = document.querySelector('.certs');
                        
                        if (p.certs) {
                            certsContainer.innerHTML += p.certs.split(',').filter(c => c).map(c => {
                                return ['GAP인증', '무농약', '유기농'].includes(c) ? `<span class="cert-fixed">${c}</span>` : `<span class="cert-custom">${c} (자체)</span>`;
                            }).join('');
                        }
                        
                        const tagsContainer = document.querySelector('.tags');
                        if (p.tags) {
                            tagsContainer.innerHTML = p.tags.split(',').filter(t => t).map(t => `<span>#${t.trim()}</span>`).join('');
                        }

                        // 🌟 핵심 요약 정보 (등급, 사이즈, 날짜) 연동
                        document.querySelector('.s-grade').innerText = p.p_grade || '일반';
                        document.querySelector('.s-size').innerText = p.p_size || '정보없음';
                        document.querySelector('.s-date').innerText = p.p_date || '-';

                        // 🌟 상세 설명 블록 생성
                        const detailSection = document.querySelector('.bottom-section');
                        const faqTitle = document.querySelector('.faq-section-title');
                        
                        if (p.content_data) {
                            try {
                                const contents = JSON.parse(p.content_data);
                                if (contents.length > 0) {
                                    contents.forEach(c => {
                                        const block = document.createElement('div');
                                        block.className = 'detail-block';
                                        block.innerHTML = `
                                            <img src="${c.img}" class="detail-img" alt="상세 사진">
                                            <div class="detail-text">${c.text ? c.text.replace(/\n/g, '<br>') : ''}</div>
                                        `;
                                        detailSection.insertBefore(block, faqTitle);
                                    });
                                } else {
                                    const block = document.createElement('div');
                                    block.className = 'detail-text';
                                    block.style.cssText = 'text-align:center; padding:40px; color:#888; margin-bottom:50px;';
                                    block.innerText = '상세 설명 이미지가 등록되지 않았습니다.';
                                    detailSection.insertBefore(block, faqTitle);
                                }
                            } catch(e) {}
                        }

                        // 🌟 FAQ 연동
                        if (p.faqs) {
                            try {
                                const faqsData = JSON.parse(p.faqs).filter(f => f.q.trim() !== '' || f.a.trim() !== '');
                                if (faqsData.length > 0) {
                                    faqsData.forEach(f => {
                                        const faqBlock = document.createElement('div');
                                        faqBlock.className = 'faq-item';
                                        faqBlock.innerHTML = `<div class="faq-q">${f.q}</div><div class="faq-a">${f.a.replace(/\n/g, '<br>')}</div>`;
                                        detailSection.appendChild(faqBlock);
                                    });
                                } else {
                                    const emptyFaq = document.createElement('div');
                                    emptyFaq.className = 'faq-item';
                                    emptyFaq.innerHTML = `<div class="faq-a" style="border:none; justify-content:center;">등록된 FAQ가 없습니다.</div>`;
                                    detailSection.appendChild(emptyFaq);
                                }
                            } catch(e) {}
                        }

                        // 🌟 수령 옵션 설정
                        const delOptions = p.delivery || '방문수거,HUB보관,택배배송';
                        document.querySelector('input[value="방문수거"]').closest('.radio-label').style.display = delOptions.includes('방문수거') ? 'block' : 'none';
                        document.querySelector('input[value="HUB보관"]').closest('.radio-label').style.display = delOptions.includes('HUB보관') ? 'block' : 'none';
                        document.querySelector('input[value="택배배송"]').closest('.radio-label').style.display = delOptions.includes('택배배송') ? 'block' : 'none';

                        if(delOptions.includes('방문수거')) document.querySelector('input[value="방문수거"]').checked = true;
                        else if(delOptions.includes('HUB보관')) document.querySelector('input[value="HUB보관"]').checked = true;
                        else if(delOptions.includes('택배배송')) document.querySelector('input[value="택배배송"]').checked = true;

                        updateMap(); 
                    }
                })
            }
        });

        function deleteProduct() {
            if (confirm('정말 이 상품을 삭제하시겠습니까?\n삭제 후에는 복구할 수 없습니다.')) {
                const productId = new URLSearchParams(window.location.search).get('id');
                fetch('/api/products/' + productId, { method: 'DELETE' })
                .then(res => res.json())
                .then(result => {
                    if (result.success) { alert('상품이 성공적으로 삭제되었습니다. 🗑️'); location.href = 'index.html'; } 
                    else { alert('삭제에 실패했습니다.'); }
                });
            }
        }

        function editProduct() {
            const productId = new URLSearchParams(window.location.search).get('id');
            location.href = 'register.html?edit=' + productId;
        }

        function sendAiChat() {
            const input = document.getElementById('aiChatInput');
            const text = input.value.trim();
            if(!text) return;
            const chatBody = document.querySelector('.ai-chat-body');
            
            const myMsg = document.createElement('div');
            myMsg.className = 'ai-msg';
            myMsg.style.cssText = 'background:#e8f5e9; border-color:#c8e6c9; align-self:flex-end; border-radius:15px 15px 0 15px; margin-bottom:10px;';
            myMsg.innerText = text;
            chatBody.appendChild(myMsg);
            
            input.value = ''; 
            chatBody.scrollTop = chatBody.scrollHeight; 

            const productId = new URLSearchParams(window.location.search).get('id');

            fetch('/api/ai-chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ productId: productId, message: text })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    setTimeout(() => {
                        const aiReply = document.createElement('div');
                        aiReply.className = 'ai-msg';
                        aiReply.style.cssText = 'background:#e3f2fd; border-color:#bbdefb; margin-bottom:10px;';
                        aiReply.innerHTML = data.reply;
                        chatBody.appendChild(aiReply);
                        chatBody.scrollTop = chatBody.scrollHeight;
                    }, 500); 
                }
            })
        }
    </script>
</body>
</html>
