<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팜마을 - FAQ 관리자</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: #f8f9fa; color: #333; padding-bottom: 60px; }
        .header { background: #333; padding: 15px 20px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        
        .form-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; border: 2px solid #87B32E; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #444; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 1rem; }
        .form-group textarea { height: 120px; resize: none; }
        .btn-submit { background: #87B32E; color: white; border: none; padding: 15px 25px; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 1.1rem; width: 100%; }

        .faq-item { background: white; padding: 20px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: flex-start; }
        .faq-content { flex: 1; }
        .faq-q { font-weight: 900; font-size: 1.1rem; color: #E69138; margin-bottom: 8px; }
        .faq-a { color: #555; line-height: 1.6; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-left: 15px; white-space: nowrap; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 1.2rem; font-weight: bold;">🛠️ 팜마을 FAQ 관리자 페이지</div>
        <a href="qna.html" style="color: white; text-decoration: none;">고객센터로 돌아가기</a>
    </div>

    <div class="container">
        <!-- FAQ 작성 폼 -->
        <div class="form-box">
            <h3 style="margin-bottom: 20px; color: #2e7d32;">새로운 자주 묻는 질문(FAQ) 등록</h3>
            <div class="form-group">
                <label>질문 (Question)</label>
                <input type="text" id="faqQ" placeholder="예: 배송은 얼마나 걸리나요?">
            </div>
            <div class="form-group">
                <label>답변 (Answer)</label>
                <textarea id="faqA" placeholder="자세한 답변을 적어주세요."></textarea>
            </div>
            <button class="btn-submit" onclick="submitFaq()">등록하기</button>
        </div>

        <!-- 등록된 FAQ 리스트 -->
        <h3 style="margin-bottom: 15px;">등록된 FAQ 목록</h3>
        <div id="faqListArea">
            <div style="text-align: center; color: #888; padding: 30px;">불러오는 중입니다...</div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 관리자 로그인 여부 확인
            fetch('/api/user').then(res => res.json()).then(data => {
                if(!data.loggedIn) {
                    alert('관리자만 접근할 수 있습니다.');
                    location.href = 'index.html';
                } else {
                    loadAdminFaqs();
                }
            });
        });

        // FAQ 등록
        function submitFaq() {
            const q = document.getElementById('faqQ').value;
            const a = document.getElementById('faqA').value;

            if(!q || !a) { alert('질문과 답변을 모두 입력해주세요.'); return; }

            fetch('/api/faqs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: q, answer: a })
            })
            .then(res => res.json())
            .then(result => {
                alert(result.message);
                if(result.success) {
                    document.getElementById('faqQ').value = '';
                    document.getElementById('faqA').value = '';
                    loadAdminFaqs();
                }
            });
        }

        // FAQ 목록 불러오기
        function loadAdminFaqs() {
            fetch('/api/faqs')
            .then(res => res.json())
            .then(result => {
                const listArea = document.getElementById('faqListArea');
                listArea.innerHTML = '';
                
                if(result.data.length === 0) {
                    listArea.innerHTML = '<div style="background:white; padding:30px; text-align:center; border-radius:12px;">등록된 FAQ가 없습니다.</div>';
                    return;
                }

                result.data.forEach(item => {
                    const html = `
                        <div class="faq-item">
                            <div class="faq-content">
                                <div class="faq-q">Q. ${item.question}</div>
                                <div class="faq-a">A. ${item.answer.replace(/\n/g, '<br>')}</div>
                            </div>
                            <button class="btn-delete" onclick="deleteFaq(${item.id})">삭제</button>
                        </div>
                    `;
                    listArea.insertAdjacentHTML('beforeend', html);
                });
            });
        }

        // FAQ 삭제
        function deleteFaq(id) {
            if(confirm('이 질문을 삭제하시겠습니까?')) {
                fetch(`/api/faqs/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(result => {
                    alert(result.message);
                    if(result.success) loadAdminFaqs();
                });
            }
        }
    </script>
</body>
</html>
