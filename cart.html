<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>팜마을 - 장바구니</title>
    <style>
        :root { --primary-green: #87B32E; --primary-orange: #E69138; --primary-blue: #4B9AD2; --bg-color: #f1f3f5; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-color); margin: 0; padding: 0; color: #333; }
        
        /* 공통 헤더 */
        .header { background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .header-inner { max-width: 1200px; margin: 0 auto; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; }
        .header .btn { font-size: 1.2rem; text-decoration: none; color: #333; font-weight: 900; cursor: pointer; }
        .header .title { font-weight: 900; font-size: 1.3rem; color: var(--primary-green); flex: 1; text-align: center; }

        /* 레이아웃 뼈대 */
        .container { max-width: 1200px; margin: 0 auto; display: flex; gap: 30px; padding: 30px 20px; align-items: flex-start; }
        .cart-content { flex: 1.8; display: flex; flex-direction: column; gap: 20px; }
        .side-summary { flex: 1; position: sticky; top: 90px; }

        /* 장바구니 리스트 영역 */
        .cart-section { background: #fff; border-radius: 20px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        
        /* 전체 선택 바 */
        .select-all-bar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 2px solid #eee; margin-bottom: 20px; font-weight: 800; }
        .custom-cb { width: 22px; height: 22px; cursor: pointer; accent-color: var(--primary-green); }
        .btn-delete-sel { background: none; border: 1px solid #ddd; padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; font-weight: 700; cursor: pointer; color: #666; }

        /* 농장별 그룹 (선택 사항) */
        .farm-group-title { font-size: 1.05rem; font-weight: 900; color: #222; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        /* 개별 상품 카드 */
        .cart-item { display: flex; gap: 15px; padding-bottom: 20px; border-bottom: 1px solid #eee; margin-bottom: 20px; position: relative; }
        .cart-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .item-cb { margin-top: 5px; }
        .item-img { width: 90px; height: 90px; border-radius: 12px; object-fit: cover; background: #f8f9fa; flex-shrink: 0; }
        
        .item-info { flex: 1; display: flex; flex-direction: column; }
        .item-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 5px; color: #222; line-height: 1.3; padding-right: 20px; }
        .item-opt { font-size: 0.85rem; color: #666; background: #f8f9fa; padding: 6px 10px; border-radius: 6px; margin-bottom: 10px; display: inline-block; width: fit-content; font-weight: 700; }
        
        .price-qty-row { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; }
        .item-price { font-weight: 900; font-size: 1.3rem; color: #111; }
        
        /* 수량 조절 버튼 */
        .qty-box { display: flex; align-items: center; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: #fff; }
        .qty-btn { width: 32px; height: 32px; background: #f8f9fa; border: none; font-size: 1.2rem; font-weight: 700; color: #555; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .qty-input { width: 40px; height: 32px; border: none; border-left: 1px solid #ddd; border-right: 1px solid #ddd; text-align: center; font-weight: 800; font-size: 1rem; color: #333; outline: none; }

        /* 삭제 버튼 (X) */
        .btn-remove { position: absolute; top: 0; right: 0; background: none; border: none; font-size: 1.2rem; color: #aaa; cursor: pointer; padding: 5px; line-height: 1; }

        /* 최종 결제 요약 (사이드바) */
        .summary-card { background: #fff; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 2px solid var(--primary-green); }
        .sec-title { font-size: 1.3rem; font-weight: 900; margin-bottom: 20px; color: #222; }
        .sum-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 1rem; color: #666; font-weight: 600; }
        .sum-row.total { border-top: 1px dashed #eee; margin-top: 15px; padding-top: 15px; color: #222; }
        .total .price { font-size: 1.8rem; font-weight: 900; color: var(--primary-orange); }

        .btn-order { width: 100%; padding: 20px; background: var(--primary-green); color: #fff; border: none; border-radius: 15px; font-size: 1.3rem; font-weight: 900; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .btn-order:hover { background: #76a025; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(135,179,46,0.3); }

        /* 빈 장바구니 안내 */
        .empty-cart { text-align: center; padding: 60px 20px; color: #888; display: none; }
        .empty-cart.show { display: block; }
        .empty-icon { font-size: 3rem; margin-bottom: 15px; }

        /* 모바일 반응형 */
        @media (max-width: 900px) {
            .container { flex-direction: column; padding: 15px; gap: 15px; }
            .side-summary { position: static; width: 100%; margin-top: 10px; }
            .cart-section, .summary-card { padding: 20px; }
            .item-img { width: 80px; height: 80px; }
            .btn-order { position: fixed; bottom: 0; left: 0; border-radius: 0; z-index: 1001; margin: 0; }
            body { padding-bottom: 80px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-inner">
            <a href="#" class="btn" onclick="history.back()">←</a>
            <div class="title">장바구니</div>
            <div style="width:20px;"></div> </div>
    </div>

    <div class="container">
        
        <div class="cart-content">
            <div class="cart-section" id="cartContainer">
                
                <div class="select-all-bar">
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                        <input type="checkbox" class="custom-cb" id="chkAll" checked onchange="toggleAll(this)"> 전체선택 (2/2)
                    </label>
                    <button class="btn-delete-sel" onclick="alert('선택한 상품을 삭제합니다.')">선택삭제</button>
                </div>

                <div class="farm-group-title">🧑‍🌾 지산동 영진농원 배송상품</div>
                
                <div class="cart-item" data-price="14000" id="item1">
                    <input type="checkbox" class="custom-cb item-cb" checked onchange="calcTotal()">
                    <img src="https://via.placeholder.com/150/ff9a9e/ffffff?text=Tomato" class="item-img">
                    <div class="item-info">
                        <button class="btn-remove" onclick="removeItem('item1')">×</button>
                        <div class="item-title">당일 수확 고당도 지산동 꿀토마토 2kg</div>
                        <div class="item-opt">수령방식: 🏠 방문수거</div>
                        <div class="price-qty-row">
                            <div class="item-price"><span class="price-val">14,000</span>원</div>
                            <div class="qty-box">
                                <button class="qty-btn" onclick="changeQty('item1', -1)">-</button>
                                <input type="number" class="qty-input" value="1" readonly>
                                <button class="qty-btn" onclick="changeQty('item1', 1)">+</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="farm-group-title" style="margin-top:30px; border-top:1px dashed #eee; padding-top:20px;">🧑‍🌾 이웃 농장 배송상품</div>

                <div class="cart-item" data-price="16000" id="item2">
                    <input type="checkbox" class="custom-cb item-cb" checked onchange="calcTotal()">
                    <img src="https://via.placeholder.com/150/87B32E/ffffff?text=Doenjang" class="item-img">
                    <div class="item-info">
                        <button class="btn-remove" onclick="removeItem('item2')">×</button>
                        <div class="item-title">3년 숙성 전통 수제 된장 1kg (항아리 발효)</div>
                        <div class="item-opt">수령방식: 📦 일반 택배 (배송비 3,000원)</div>
                        <div class="price-qty-row">
                            <div class="item-price"><span class="price-val">16,000</span>원</div>
                            <div class="qty-box">
                                <button class="qty-btn" onclick="changeQty('item2', -1)">-</button>
                                <input type="number" class="qty-input" value="1" readonly>
                                <button class="qty-btn" onclick="changeQty('item2', 1)">+</button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="cart-section empty-cart" id="emptyCart">
                <div class="empty-icon">🛒</div>
                <h3 style="margin-bottom:10px; color:#333;">장바구니에 담긴 상품이 없습니다.</h3>
                <p style="font-size:0.95rem; line-height:1.5;">신선한 평택 로컬 상품들을 둘러보고<br>장바구니에 담아보세요!</p>
            </div>
        </div>

        <div class="side-summary">
            <div class="summary-card">
                <div class="sec-title">결제 예정 금액</div>
                <div class="sum-row"><span>상품 금액</span><span id="sumProd">30,000원</span></div>
                <div class="sum-row"><span>배송비 (택배)</span><span id="sumDel">3,000원</span></div>
                
                <div class="sum-row total">
                    <span>총 결제금액</span>
                    <span class="price" id="sumTotal">33,000원</span>
                </div>

                <button class="btn-order" onclick="goToCheckout()">33,000원 주문하기</button>
            </div>
        </div>
    </div>

    <script>
        // 수량 변경 함수
        function changeQty(itemId, amount) {
            const item = document.getElementById(itemId);
            const input = item.querySelector('.qty-input');
            let qty = parseInt(input.value) + amount;
            
            if (qty < 1) {
                alert('수량은 1개 이상이어야 합니다.');
                return;
            }
            
            input.value = qty;
            
            // 개별 상품 총액 업데이트 (단가 * 수량)
            const unitPrice = parseInt(item.getAttribute('data-price'));
            const totalPrice = unitPrice * qty;
            item.querySelector('.price-val').innerText = totalPrice.toLocaleString();
            
            calcTotal();
        }

        // 전체 선택/해제 로직
        function toggleAll(source) {
            const checkboxes = document.querySelectorAll('.item-cb');
            checkboxes.forEach(cb => {
                // 부모 item이 화면에 보이는 경우에만 체크
                if(cb.closest('.cart-item').style.display !== 'none') {
                    cb.checked = source.checked;
                }
            });
            calcTotal();
        }

        // 개별 삭제 함수 (숨김 처리로 시뮬레이션)
        function removeItem(itemId) {
            if(confirm('이 상품을 장바구니에서 삭제하시겠습니까?')) {
                const item = document.getElementById(itemId);
                item.style.display = 'none';
                item.querySelector('.item-cb').checked = false; // 선택 해제
                calcTotal();
                checkEmpty();
            }
        }

        // 장바구니 비었는지 체크
        function checkEmpty() {
            const items = document.querySelectorAll('.cart-item');
            let isAllHidden = true;
            items.forEach(item => {
                if(item.style.display !== 'none') isAllHidden = false;
            });

            if(isAllHidden) {
                document.getElementById('cartContainer').style.display = 'none';
                document.getElementById('emptyCart').classList.add('show');
                document.querySelector('.btn-order').disabled = true;
                document.querySelector('.btn-order').style.background = '#ccc';
            }
        }

        // 총액 실시간 계산기
        function calcTotal() {
            const items = document.querySelectorAll('.cart-item');
            let prodTotal = 0;
            let delTotal = 0;
            let checkedCount = 0;

            items.forEach(item => {
                if(item.style.display !== 'none' && item.querySelector('.item-cb').checked) {
                    checkedCount++;
                    const unitPrice = parseInt(item.getAttribute('data-price'));
                    const qty = parseInt(item.querySelector('.qty-input').value);
                    prodTotal += (unitPrice * qty);
                    
                    // 예시: item2(된장)만 택배비 3,000원 부과
                    if(item.id === 'item2') {
                        delTotal += 3000;
                    }
                }
            });

            // 상단 전체선택 텍스트 업데이트
            const totalItems = Array.from(items).filter(i => i.style.display !== 'none').length;
            document.querySelector('.select-all-bar label').innerHTML = `<input type="checkbox" class="custom-cb" id="chkAll" ${checkedCount === totalItems && totalItems > 0 ? 'checked' : ''} onchange="toggleAll(this)"> 전체선택 (${checkedCount}/${totalItems})`;

            // 요약 패널 업데이트
            document.getElementById('sumProd').innerText = prodTotal.toLocaleString() + '원';
            document.getElementById('sumDel').innerText = delTotal.toLocaleString() + '원';
            
            const finalTotal = prodTotal + delTotal;
            document.getElementById('sumTotal').innerText = finalTotal.toLocaleString() + '원';
            
            const btn = document.querySelector('.btn-order');
            if(checkedCount > 0) {
                btn.innerText = finalTotal.toLocaleString() + '원 주문하기';
            } else {
                btn.innerText = '상품을 선택해주세요';
            }
        }

        function goToCheckout() {
            const total = document.getElementById('sumTotal').innerText;
            if(total === '0원') {
                alert('주문할 상품을 선택해주세요.');
            } else {
                alert('주문서 작성 페이지로 이동합니다! 🚀');
            }
        }
    </script>
</body>
</html>
