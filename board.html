<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팜마을 - 잔디밭 목록</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background-color: #f9fbf9; color: #333; }
        header { background: #fff; padding: 15px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #87B32E; text-decoration: none; }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .board-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-write { background-color: #a066c0; color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; }
        
        .post-list { background: #fff; border-radius: 12px; border: 1px solid #eee; overflow: hidden; }
        .post-item { padding: 18px 25px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.2s; }
        .post-item:hover { background-color: #f8fafc; }
        .post-item:last-child { border-bottom: none; }
        .post-info { flex: 1; margin-right: 20px; }
        .post-title { font-size: 1.1rem; font-weight: bold; color: #222; margin-bottom: 5px; }
        .post-meta { font-size: 0.85rem; color: #888; }
        .post-icon { color: #87B32E; font-size: 1.2rem; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">🌱 팜마을 잔디밭</a>
        <a href="index.html" style="text-decoration: none; font-weight: bold; color: #666;">🏠 홈</a>
    </header>
    
    <div class="container">
        <div class="board-header">
            <h1>전체 이야기</h1>
            <a href="board_write.html" class="btn-write">✏️ 글쓰기</a>
        </div>
        
        <div class="post-list" id="postListContainer"></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            fetch('/api/board')
                .then(response => response.json())
                .then(result => {
                    const container = document.getElementById('postListContainer');
                    if (!result.data || result.data.length === 0) {
                        container.innerHTML = '<div style="padding:40px; text-align:center; color:#999;">등록된 글이 없습니다.</div>';
                        return;
                    }
                    result.data.forEach(post => {
                        const date = new Date(post.created_at).toLocaleDateString();
                        // 🌟 조회수(views)를 화면에 추가했습니다.
                        const views = post.views || 0;
                        const itemHtml = `
                            <div class="post-item" onclick="location.href='board_detail.html?id=${post.id}'">
                                <div class="post-info">
                                    <div class="post-title">${post.title}</div>
                                    <div class="post-meta">🧑‍🌾 ${post.nickname} | 📅 ${date} | 👁️ 조회 ${views}</div>
                                </div>
                                <div class="post-icon">❯</div>
                            </div>
                        `;
                        container.insertAdjacentHTML('beforeend', itemHtml);
                    });
                });
        });
    </script>
</body>
</html>
