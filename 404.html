<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팜마을 - 페이지를 찾을 수 없습니다</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        body { background: #f8f9fa; font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .icon { font-size: 5rem; margin-bottom: 20px; }
        h1 { font-size: 2rem; color: #87B32E; margin-bottom: 15px; font-family: 'Jua', sans-serif; }
        p { color: #666; font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px; }
        .btn-home { background: #E69138; color: white; padding: 15px 30px; border-radius: 30px; text-decoration: none; font-weight: 900; font-size: 1.1rem; transition: 0.2s; box-shadow: 0 4px 15px rgba(230,145,56,0.3); }
        .btn-home:hover { transform: translateY(-3px); background: #d84315; }
    </style>
</head>
<body>
    <div class="icon">🌱🚶‍♂️</div>
    <h1>앗, 길을 잃으셨나요?</h1>
    <p>찾으시는 페이지의 주소가 잘못 입력되었거나<br>현재 삭제되어 이동된 페이지입니다.</p>
    <a href="index.html" class="btn-home">팜마을 홈으로 돌아가기</a>

</html>
