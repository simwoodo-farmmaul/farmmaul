<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팜마을 - 노하우 상세</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background-color: #f4f7f6; color: #333; padding-bottom: 60px; }
        header { background: #fff; padding: 15px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:10; }
        .farm-logo { flex: 1; display: flex; align-items: center; gap: 6px; text-decoration: none; font-weight: 900; font-size: 1.2rem; color: #87B32E; }
        .center-title { flex: 1; text-align: center; font-size: 1.3rem; font-weight: 900; color: #333; white-space: nowrap; }
        
        .main-container { max-width: 800px; margin: 30px auto; background: white; border-radius: 12px; border: 1px solid #eaeaea; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .detail-header { padding: 25px 30px; border-bottom: 1px solid #f0f0f0; }
        .post-title { font-size: 1.5rem; font-weight: 900; color: #222; margin-bottom: 12px; line-height: 1.4; }
        .post-info { font-size: 0.9rem; color: #666; display: flex; gap: 15px; }
        
        .detail-body { padding: 30px; line-height: 1.7; font-size: 1.05rem; color: #444; }
        .image-gallery { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .gallery-img { width: 100%; max-height: 500px; object-fit: contain; border-radius: 8px; background: #fafafa; }
        .post-text-content { white-space: pre-wrap; margin-top: 20px; }

        .author-actions { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; text-align: right; display: none; }
        .btn-action { padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; margin-left: 10px; }
        .btn-delete { background: #ff4d4d; color: white; }
        .btn-edit { background: #4B9AD2; color: white; }

        /* 👇 새롭게 추가된 댓글 섹션 스타일 */
        .comment-section { background: #fff; padding: 25px 30px; border-top: 5px solid #f4f7f6; }
        .comment-title { font-size: 1.1rem; font-weight: 900; margin-bottom: 15px; }
        .comment-input-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .comment-input-box input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; outline: none; }
        .comment-submit { background: #87B32E; color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .comment-list { display: flex; flex-direction: column; gap: 15px; }
        .comment-item { background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
        .comment-author { font-weight: 800; font-size: 0.95rem; margin-bottom: 5px; color: #222; }
        .comment-text { font-size: 0.95rem; color: #555; }
        .comment-date { font-size: 0.8rem; color: #999; margin-top: 5px; text-align: right; }

        /* 👇 새롭게 추가된 수정 모달(팝업창) 스타일 */
        #editModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .edit-box { background: #fff; width: 90%; max-width: 600px; padding: 25px; border-radius: 12px; }
        .edit-box input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; }
        .edit-box textarea { width: 100%; padding: 10px; height: 150px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; resize: vertical; font-size: 1rem; }
        .edit-btns { text-align: right; }
        .edit-btns button { padding: 8px 15px; margin-left: 5px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-save { background: #87B32E; color: #fff; }
        .btn-cancel { background: #ccc; color: #333; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="farm-logo"><img src="farmmaul.webp" style="height: 24px;"> 팜마을</a>
        <div class="center-title">📖 잘키우는법 상세</div>
        <a href="knowhow.html" style="flex:1; text-align:right; text-decoration:none; color:#666; font-weight:bold;">목록으로</a>
    </header>

    <div class="main-container">
        <div class="detail-header">
            <div class="post-title" id="postTitle">로딩 중입니다...</div>
            <div class="post-info">
                <span id="postAuthor">🧑‍🌾 </span>
                <span id="postDate">📅 </span>
            </div>
        </div>
        
        <div class="detail-body">
            <div class="image-gallery" id="imageGallery"></div>
            <div class="post-text-content" id="postContent"></div>

            <div class="author-actions" id="authorActions">
                <button class="btn-action btn-edit" onclick="openEditModal()">✏️ 이 노하우 수정하기</button>
                <button class="btn-action btn-delete" onclick="deletePost()">🗑️ 이 노하우 삭제하기</button>
            </div>
        </div>

        <div class="comment-section">
            <div class="comment-title">💬 이 글의 댓글</div>
            <div class="comment-input-box">
                <input type="text" id="commentInput" placeholder="댓글을 입력해주세요 (로그인 필요)" onkeypress="if(event.key==='Enter') submitComment()">
                <button class="comment-submit" onclick="submitComment()">등록</button>
            </div>
            <div class="comment-list" id="commentList">
                </div>
        </div>
    </div>

    <div id="editModal">
        <div class="edit-box">
            <h3 style="margin-bottom: 15px;">✏️ 노하우 수정하기</h3>
            <input type="text" id="editTitle" placeholder="제목을 입력하세요">
            <textarea id="editContent" placeholder="내용을 입력하세요"></textarea>
            <div class="edit-btns">
                <button class="btn-cancel" onclick="closeEditModal()">취소</button>
                <button class="btn-save" onclick="saveEdit()">저장하기</button>
            </div>
        </div>
    </div>

    <script>
        let currentPostId = null;

        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            currentPostId = urlParams.get('id');

            loadPost();
            loadComments(); // 댓글 불러오기 실행!
        });

        function loadPost() {
            fetch(`/api/knowhow/${currentPostId}`)
                .then(res => res.json())
                .then(result => {
                    if(!result.success) { alert('글을 가져올 수 없습니다.'); location.href = 'knowhow.html'; return; }

                    const post = result.data;
                    document.getElementById('postTitle').innerText = post.title;
                    document.getElementById('postAuthor').innerText = `🧑‍🌾 ${post.nickname}`;
                    document.getElementById('postDate').innerText = `📅 ${new Date(post.created_at).toLocaleDateString()}`;
                    document.getElementById('postContent').innerText = post.content;

                    // 모달 창에 수정하기 좋게 원래 글씨 미리 넣어주기
                    document.getElementById('editTitle').value = post.title;
                    document.getElementById('editContent').value = post.content;

                    // 작성자 본인 또는 관리자일 때만 수정/삭제 버튼 보이기
                    if (result.currentUser === post.nickname || result.isAdmin) {
                        document.getElementById('authorActions').style.display = 'block';
                    }

                    // 사진 렌더링
                    let images = [];
                    try { images = JSON.parse(post.images); } catch(e) { images = []; }
                    const gallery = document.getElementById('imageGallery');
                    gallery.innerHTML = ''; 
                    images.forEach(imgBase64 => {
                        const imgTag = document.createElement('img');
                        imgTag.className = 'gallery-img'; imgTag.src = imgBase64;
                        gallery.appendChild(imgTag);
                    });
                });
        }

        // 삭제 기능
        function deletePost() {
            if(confirm('정말 이 노하우 글을 삭제하시겠습니까?')) {
                fetch(`/api/knowhow/${currentPostId}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(res => {
                    alert(res.message);
                    if(res.success) location.href = 'knowhow.html';
                });
            }
        }

        // 수정 팝업창 열고 닫기
        function openEditModal() { document.getElementById('editModal').style.display = 'flex'; }
        function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }

        // 수정한 내용 저장하기
        function saveEdit() {
            const newTitle = document.getElementById('editTitle').value;
            const newContent = document.getElementById('editContent').value;

            if(!newTitle || !newContent) { alert('제목과 내용을 모두 입력해주세요.'); return; }

            fetch(`/api/knowhow/${currentPostId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: newTitle, content: newContent })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                if(data.success) {
                    closeEditModal();
                    loadPost(); // 화면 새로고침 안 해도 글씨 바뀌게 함
                }
            });
        }

        // 댓글 불러오기 기능
        function loadComments() {
            fetch(`/api/knowhow/comments/${currentPostId}`)
            .then(res => res.json())
            .then(result => {
                const list = document.getElementById('commentList');
                list.innerHTML = '';
                if (result.success && result.data.length > 0) {
                    result.data.forEach(comment => {
                        const date = new Date(comment.created_at).toLocaleString();
                        list.innerHTML += `
                            <div class="comment-item">
                                <div class="comment-author">🧑‍🌾 ${comment.author}</div>
                                <div class="comment-text">${comment.content}</div>
                                <div class="comment-date">${date}</div>
                            </div>
                        `;
                    });
                } else {
                    list.innerHTML = '<div style="color:#888; text-align:center; padding:10px;">아직 작성된 댓글이 없습니다. 첫 댓글을 남겨보세요!</div>';
                }
            });
        }

        // 댓글 등록하기 기능
        function submitComment() {
            const content = document.getElementById('commentInput').value.trim();
            if (!content) { alert('댓글 내용을 입력해주세요.'); return; }

            fetch('/api/knowhow/comments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ post_id: currentPostId, content: content })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('commentInput').value = '';
                    loadComments(); // 댓글 달면 바로 보이게 새로고침
                } else {
                    alert(data.message); // 예: 로그인이 필요합니다
                }
            });
        }
    </script>
</body>
</html>
