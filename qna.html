<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팜마을 - 고객센터</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: #f8f9fa; color: #333; padding-bottom: 80px; }
        a { text-decoration: none; color: inherit; }

        .header { background: #fff; padding: 15px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .farm-logo { flex: 1; display: flex; align-items: center; gap: 6px; font-weight: 900; font-size: 1.2rem; color: #87B32E; }
        .center-title { flex: 1; text-align: center; font-size: 1.3rem; font-weight: 900; color: #333; white-space: nowrap; }
        .btn-home { flex: 1; text-align: right; font-weight: bold; color: #666; font-size: 1rem; }

        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }

        .qna-banner { background: linear-gradient(135deg, #87B32E, #6b9122); border-radius: 15px; padding: 30px; text-align: center; color: white; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(135, 179, 46, 0.3); }
        .qna-banner h2 { font-size: 1.4rem; font-weight: 900; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .qna-banner p { font-size: 1rem; line-height: 1.6; opacity: 0.95; margin-bottom: 0; }

        .tabs { display: flex; background: #fff; border-radius: 12px; overflow: hidden; margin-bottom: 25px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); border: 1px solid #eaeaea; }
        .tab { flex: 1; text-align: center; padding: 18px; font-weight: 900; font-size: 1.1rem; color: #888; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s; }
        .tab.active { color: var(--primary-orange, #E69138); border-bottom-color: var(--primary-orange, #E69138); background: #fffaf0; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .faq-item { background: #fff; border-radius: 12px; margin-bottom: 15px; padding: 25px; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .faq-q { font-weight: 900; font-size: 1.15rem; color: #222; margin-bottom: 12px; display: flex; gap: 8px; }
        .faq-q::before { content: 'Q.'; color: var(--primary-orange, #E69138); }
        .faq-a { font-size: 1.05rem; color: #444; line-height: 1.6; display: flex; gap: 8px; padding-top: 15px; border-top: 1px dashed #ddd; }
        .faq-a::before { content: 'A.'; color: var(--primary-green, #87B32E); font-weight: 900; }

        .qna-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #eaeaea; padding-bottom: 15px; }
        .btn-write { background: var(--primary-green, #87B32E); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .qna-write-box { background: #fff; padding: 25px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 25px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .qna-write-box input, .qna-write-box textarea { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; font-size: 1rem; outline: none; }
        .qna-write-box textarea { height: 150px; resize: none; }
        .btn-submit { background: var(--primary-orange, #E69138); color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }

        .qna-item { background: #fff; border-radius: 12px; padding: 25px; border: 1px solid #eee; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .qna-title { font-size: 1.2rem; font-weight: 900; margin-bottom: 10px; color: #222; display: flex; gap: 8px; }
        .qna-title::before { content: 'Q.'; color: var(--primary-orange, #E69138); }
        .qna-meta { font-size: 0.9rem; color: #888; margin-bottom: 15px; font-weight: 600; padding-bottom: 15px; border-bottom: 1px dashed #eee; }
        .qna-content { font-size: 1.05rem; color: #444; line-height: 1.7; margin-bottom: 15px; white-space: pre-wrap; }
        
        .qna-reply { background: #e3f2fd; padding: 20px; border-radius: 8px; border-left: 4px solid var(--primary-blue, #4B9AD2); margin-top: 20px; }
        .qna-reply-title { font-weight: 900; color: #1565c0; margin-bottom: 8px; font-size: 1rem; display: flex; align-items: center; gap: 6px; }
        .qna-reply-content { font-size: 1rem; color: #333; line-height: 1.6; white-space: pre-wrap; }
        
        .admin-reply-form { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px dashed #ccc; }
        .admin-reply-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; resize: none; height: 80px; font-size: 0.95rem; }
        .btn-reply { background: var(--primary-blue, #4B9AD2); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; align-self: flex-end; }

        /* 🌟 수정/삭제 버튼 스타일 */
        .author-actions { margin-top: 15px; text-align: right; border-top: 1px solid #eee; padding-top: 15px; }
        .btn-action { padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; margin-left: 5px; font-size: 0.9rem; }
        .btn-edit { background: #4B9AD2; color: white; }
        .btn-delete { background: #ff4d4d; color: white; }

        /* 🌟 이웃 댓글창 스타일 */
        .qna-comments-wrap { margin-top: 20px; background: #f9fbf9; padding: 20px; border-radius: 8px; border: 1px solid #e0e0e0; }
        .comment-item { border-bottom: 1px dashed #ddd; padding-bottom: 10px; margin-bottom: 10px; }
        .comment-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .comment-author { font-weight: 900; font-size: 0.9rem; color: #2e7d32; }
        .comment-text { font-size: 0.95rem; color: #555; margin-top: 4px; }
        .comment-date { font-size: 0.8rem; color: #aaa; margin-top: 4px; }
        .comment-input-wrap { display: flex; gap: 10px; margin-top: 15px; }
        .comment-input-wrap input { flex: 1; padding: 10px 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 0.95rem; outline: none; }
        .comment-input-wrap button { background: #87B32E; color: #fff; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* 🌟 수정 팝업창 스타일 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: #fff; width: 90%; max-width: 600px; padding: 25px; border-radius: 12px; }
        .modal-box input, .modal-box textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; outline: none; }
        .modal-box textarea { height: 150px; resize: vertical; }
        .modal-btns { text-align: right; }
        .modal-btns button { padding: 8px 15px; margin-left: 5px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-cancel { background: #ccc; color: #333; }
        .btn-save { background: #87B32E; color: #fff; }

        @media (max-width: 768px) {
            .container { padding: 15px 0; }
            .qna-banner, .tabs { border-radius: 0; border-left: none; border-right: none; }
            .qna-header { padding: 0 15px; }
            .faq-item, .qna-write-box, .qna-item { border-radius: 0; border-left: none; border-right: none; }
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="farm-logo"><img src="farmmaul.webp" style="height: 24px;" onerror="this.style.display='none'"> 팜마을</a>
        <div class="center-title">고객센터</div>
        <a href="index.html" class="btn-home">홈으로</a>
    </div>

    <div class="container">
        <div class="qna-banner">
            <h2>🤝 팜마을 고객센터</h2>
            <p>이용 중 궁금하신 점이나 불편하신 점을 남겨주시면,<br>팜마을 관리자가 빠르고 친절하게 해결해 드리겠습니다.</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('faqTab', this)">❓ 자주 묻는 질문 (FAQ)</div>
            <div class="tab" onclick="switchTab('qnaTab', this)">🙋 질문있어요</div>
        </div>

        <div id="faqTab" class="tab-content active">
            <div id="adminFaqBtnWrap" style="text-align: right; margin-bottom: 15px; display: none;">
                <button onclick="location.href='admin_faq.html'" style="background: var(--primary-orange, #E69138); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">🛠️ FAQ 작성 및 관리 페이지로 가기</button>
            </div>
            <div id="faqListArea">
                <div style="text-align:center; padding:50px; color:#888;">자주 묻는 질문을 불러오는 중입니다... ⏳</div>
            </div>
        </div>

        <div id="qnaTab" class="tab-content">
            <div class="qna-header">
                <h3 style="color:#222; font-size:1.3rem;">동네 이웃 질문 게시판</h3>
                <button class="btn-write" onclick="toggleWriteForm()">✏️ 질문 작성하기</button>
            </div>

            <div id="writeForm" class="qna-write-box">
                <h4 style="margin-bottom: 15px; color: #333;">어떤 점이 궁금하신가요?</h4>
                <input type="text" id="qTitle" placeholder="제목을 입력해주세요" required>
                <textarea id="qContent" placeholder="궁금한 내용을 자세히 적어주시면 빠르게 답변해 드립니다!" required></textarea>
                <button class="btn-submit" onclick="submitQuestion()">질문 등록하기</button>
            </div>

            <div id="qnaList">
                <div style="text-align:center; padding:50px; color:#888;">서버에서 질문 목록을 불러오는 중입니다... ⏳</div>
            </div>
        </div>
    </div>

    <div id="editQnaModal" class="modal-overlay">
        <div class="modal-box">
            <h3 style="margin-bottom: 15px; color:#333;">✏️ 질문 수정하기</h3>
            <input type="text" id="editQnaTitle" placeholder="제목을 입력하세요">
            <textarea id="editQnaContent" placeholder="내용을 입력하세요"></textarea>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeEditQnaModal()">취소</button>
                <button class="btn-save" onclick="saveEditQna()">저장하기</button>
            </div>
        </div>
    </div>

    <script>
        let globalQnaList = [];
        let editingQnaId = null;

        document.addEventListener("DOMContentLoaded", function() {
            loadFaqList(); 
            fetch('/api/user').then(res => res.json()).then(data => {
                if(data.loggedIn) {
                    const adminEmails = ['greenpic@naver.com', 'simwoodo@naver.com'];
                    if(adminEmails.includes(data.user.email) && !data.user.kakaoId) {
                        document.getElementById('adminFaqBtnWrap').style.display = 'block';
                    }
                }
            });
        });

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
            
            if(tabId === 'qnaTab') loadQnaList();
            if(tabId === 'faqTab') loadFaqList();
        }

        function loadFaqList() {
            fetch('/api/faqs')
            .then(res => res.json())
            .then(result => {
                const listArea = document.getElementById('faqListArea');
                listArea.innerHTML = '';
                if(result.data.length === 0) {
                    listArea.innerHTML = '<div style="text-align:center; padding:50px; background:#fff; border-radius:12px; border:1px solid #eee; color:#888; font-weight:600;">현재 등록된 자주 묻는 질문이 없습니다.</div>';
                    return;
                }
                result.data.forEach(item => {
                    const html = `
                        <div class="faq-item">
                            <div class="faq-q">${item.question}</div>
                            <div class="faq-a">${item.answer.replace(/\n/g, '<br>')}</div>
                        </div>
                    `;
                    listArea.insertAdjacentHTML('beforeend', html);
                });
            });
        }

        function toggleWriteForm() {
            fetch('/api/user').then(res => res.json()).then(data => {
                if(!data.loggedIn) {
                    alert('로그인한 회원만 질문을 남길 수 있습니다. 로그인 페이지로 이동합니다.');
                    location.href = 'login.html';
                    return;
                }
                const form = document.getElementById('writeForm');
                form.style.display = form.style.display === 'block' ? 'none' : 'block';
            });
        }

        function submitQuestion() {
            const title = document.getElementById('qTitle').value;
            const content = document.getElementById('qContent').value;
            if(!title || !content) { alert('제목과 내용을 모두 입력해주세요.'); return; }

            fetch('/api/qna', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content })
            })
            .then(res => res.json())
            .then(result => {
                alert(result.message);
                if(result.success) {
                    document.getElementById('qTitle').value = '';
                    document.getElementById('qContent').value = '';
                    document.getElementById('writeForm').style.display = 'none';
                    loadQnaList(); 
                }
            });
        }

        // 🌟 QnA 목록 및 수정/삭제 버튼 렌더링
        function loadQnaList() {
            fetch('/api/qna')
            .then(res => res.json())
            .then(result => {
                const listArea = document.getElementById('qnaList');
                listArea.innerHTML = '';

                if(result.data.length === 0) {
                    listArea.innerHTML = '<div style="text-align:center; padding:50px; background:#fff; border-radius:12px; border:1px solid #eee; color:#888; font-weight:600;">아직 등록된 질문이 없습니다.<br>궁금한 점이 있다면 첫 번째 질문을 남겨보세요!</div>';
                    return;
                }

                globalQnaList = result.data; // 수정을 위해 배열에 저장

                result.data.forEach(item => {
                    const date = new Date(item.created_at).toLocaleDateString();
                    
                    let replyHtml = '';
                    if(item.reply) {
                        replyHtml = `
                            <div class="qna-reply">
                                <div class="qna-reply-title"><span>🧑‍🌾</span> 팜마을 관리자 답변</div>
                                <div class="qna-reply-content">${item.reply.replace(/\n/g, '<br>')}</div>
                            </div>
                        `;
                    } 
                    else if(result.isAdmin) {
                        replyHtml = `
                            <div class="admin-reply-form">
                                <div style="font-weight:800; color:#4B9AD2; font-size:0.9rem;">🛠️ 관리자 답변 작성</div>
                                <textarea id="replyInput_${item.id}" class="admin-reply-input" placeholder="이 질문에 대한 답변을 작성하세요..."></textarea>
                                <button class="btn-reply" onclick="submitReply(${item.id})">✅ 답변 등록하기</button>
                            </div>
                        `;
                    }

                    // 수정/삭제 권한 버튼
                    let actionHtml = '';
                    if (result.currentUser === item.nickname || result.isAdmin) {
                        actionHtml = `
                            <div class="author-actions">
                                <button class="btn-action btn-edit" onclick="openEditQnaModal(${item.id})">✏️ 수정</button>
                                <button class="btn-action btn-delete" onclick="deleteQna(${item.id})">🗑️ 삭제</button>
                            </div>
                        `;
                    }

                    const html = `
                        <div class="qna-item">
                            <div class="qna-title">${item.title}</div>
                            <div class="qna-meta">🧑‍🌾 ${item.nickname} | 📅 ${date}</div>
                            <div class="qna-content">${item.content.replace(/\n/g, '<br>')}</div>
                            ${replyHtml}
                            ${actionHtml}

                            <div class="qna-comments-wrap">
                                <div style="font-weight: 800; margin-bottom: 15px; font-size: 0.95rem; color: #a066c0;">💬 이웃들의 댓글</div>
                                <div id="qnaCommentsList_${item.id}">
                                    </div>
                                <div class="comment-input-wrap">
                                    <input type="text" id="qnaCommentInput_${item.id}" placeholder="댓글을 입력해주세요 (로그인 필요)" onkeypress="if(event.key==='Enter') submitQnaComment(${item.id})">
                                    <button onclick="submitQnaComment(${item.id})">등록</button>
                                </div>
                            </div>
                        </div>
                    `;
                    listArea.insertAdjacentHTML('beforeend', html);

                    // 질문별 댓글 불러오기 실행
                    loadQnaComments(item.id);
                });
            });
        }

        // 🌟 수정 팝업 열기
        function openEditQnaModal(id) {
            const item = globalQnaList.find(q => q.id === id);
            if (!item) return;
            editingQnaId = id;
            document.getElementById('editQnaTitle').value = item.title;
            document.getElementById('editQnaContent').value = item.content;
            document.getElementById('editQnaModal').style.display = 'flex';
        }

        // 🌟 수정 팝업 닫기
        function closeEditQnaModal() {
            document.getElementById('editQnaModal').style.display = 'none';
            editingQnaId = null;
        }

        // 🌟 수정 내용 저장
        function saveEditQna() {
            const newTitle = document.getElementById('editQnaTitle').value;
            const newContent = document.getElementById('editQnaContent').value;
            if(!newTitle || !newContent) { alert('제목과 내용을 모두 입력해주세요.'); return; }

            fetch(`/api/qna/${editingQnaId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: newTitle, content: newContent })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                if(data.success) {
                    closeEditQnaModal();
                    loadQnaList();
                }
            });
        }

        // 🌟 질문 삭제
        function deleteQna(id) {
            if(confirm('정말 이 질문을 삭제하시겠습니까?')) {
                fetch(`/api/qna/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(data => {
                    alert(data.message);
                    if(data.success) loadQnaList();
                });
            }
        }

        // 🌟 이웃 댓글 불러오기
        function loadQnaComments(postId) {
            fetch(`/api/qna/comments/${postId}`)
            .then(res => res.json())
            .then(result => {
                const list = document.getElementById(`qnaCommentsList_${postId}`);
                list.innerHTML = '';
                if (result.success && result.data.length > 0) {
                    result.data.forEach(comment => {
                        const date = new Date(comment.created_at).toLocaleString();
                        list.innerHTML += `
                            <div class="comment-item">
                                <div class="comment-author">🧑‍🌾 ${comment.author} <span class="comment-date" style="font-weight:normal; margin-left:8px;">${date}</span></div>
                                <div class="comment-text">${comment.content}</div>
                            </div>
                        `;
                    });
                } else {
                    list.innerHTML = '<div style="color:#aaa; font-size:0.9rem; margin-bottom:10px;">아직 작성된 이웃 댓글이 없습니다.</div>';
                }
            });
        }

        // 🌟 이웃 댓글 등록하기
        function submitQnaComment(postId) {
            const inputField = document.getElementById(`qnaCommentInput_${postId}`);
            const content = inputField.value.trim();
            if (!content) { alert('댓글 내용을 입력해주세요.'); return; }

            fetch('/api/qna/comments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ post_id: postId, content: content })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    inputField.value = '';
                    loadQnaComments(postId); // 댓글 달면 바로 새로고침
                } else {
                    alert(data.message);
                    if (data.message === '로그인이 필요합니다.') {
                        location.href = 'login.html';
                    }
                }
            });
        }

        function submitReply(qnaId) {
            const replyContent = document.getElementById(`replyInput_${qnaId}`).value;
            if(!replyContent) { alert('답변 내용을 입력해주세요.'); return; }

            fetch(`/api/qna/${qnaId}/reply`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reply: replyContent })
            })
            .then(res => res.json())
            .then(result => {
                alert(result.message);
                if(result.success) loadQnaList();
            });
        }
    </script>
</body>
</html>
