<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팜마을 - 질문있어요</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: #f8f9fa; color: #333; padding-bottom: 80px; }
        a { text-decoration: none; color: inherit; }

        .header { background: #fff; padding: 15px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .farm-logo { flex: 1; display: flex; align-items: center; gap: 6px; font-weight: 900; font-size: 1.2rem; color: #87B32E; }
        .center-title { flex: 1; text-align: center; font-size: 1.3rem; font-weight: 900; color: #333; white-space: nowrap; }
        .btn-home { flex: 1; text-align: right; font-weight: bold; color: #666; font-size: 1rem; }

        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }

        /* 🌟 팜마을 전용 채팅 안내 배너 */
        .chat-banner { background: linear-gradient(135deg, #4B9AD2, #2980b9); border-radius: 15px; padding: 30px; text-align: center; color: white; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(75, 154, 210, 0.3); }
        .chat-banner h2 { font-size: 1.4rem; font-weight: 900; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .chat-banner p { font-size: 1rem; line-height: 1.6; opacity: 0.9; margin-bottom: 20px; }
        .btn-chat { background: white; color: #4B9AD2; font-weight: 900; padding: 12px 25px; border-radius: 25px; display: inline-block; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: none; font-size: 1.05rem; }
        .btn-chat:hover { transform: translateY(-3px); }

        /* 🌟 질문있어요 (QnA) 게시판 스타일 */
        .qna-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #eaeaea; padding-bottom: 15px; }
        .btn-write { background: var(--primary-green, #87B32E); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-write:hover { background: #6b9122; }
        
        .qna-write-box { background: #fff; padding: 25px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 25px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .qna-write-box input, .qna-write-box textarea { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; font-size: 1rem; outline: none; }
        .qna-write-box textarea { height: 150px; resize: none; }
        .btn-submit { background: var(--primary-orange, #E69138); color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .btn-submit:hover { background: #d84315; }

        /* QnA 리스트 아이템 */
        .qna-item { background: #fff; border-radius: 12px; padding: 25px; border: 1px solid #eee; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .qna-title { font-size: 1.2rem; font-weight: 900; margin-bottom: 10px; color: #222; display: flex; gap: 8px; }
        .qna-title::before { content: 'Q.'; color: var(--primary-orange, #E69138); }
        .qna-meta { font-size: 0.9rem; color: #888; margin-bottom: 15px; font-weight: 600; padding-bottom: 15px; border-bottom: 1px dashed #eee; }
        .qna-content { font-size: 1.05rem; color: #444; line-height: 1.7; margin-bottom: 15px; white-space: pre-wrap; }
        
        /* 관리자 답변 영역 */
        .qna-reply { background: #e3f2fd; padding: 20px; border-radius: 8px; border-left: 4px solid var(--primary-blue, #4B9AD2); margin-top: 20px; }
        .qna-reply-title { font-weight: 900; color: #1565c0; margin-bottom: 8px; font-size: 1rem; display: flex; align-items: center; gap: 6px; }
        .qna-reply-content { font-size: 1rem; color: #333; line-height: 1.6; white-space: pre-wrap; }
        
        /* 관리자 전용 답변 달기 폼 */
        .admin-reply-form { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px dashed #ccc; }
        .admin-reply-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; resize: none; height: 80px; font-size: 0.95rem; }
        .btn-reply { background: var(--primary-blue, #4B9AD2); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; align-self: flex-end; }

    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="farm-logo"><img src="farmmaul.webp" style="height: 24px;" onerror="this.style.display='none'"> 팜마을</a>
        <div class="center-title">💬 질문있어요</div>
        <a href="index.html" class="btn-home">홈으로</a>
    </div>

    <div class="container">
        <!-- 🌟 새롭게 바뀐 팜마을 실시간 채팅 배너 -->
        <div class="chat-banner">
            <h2>💬 팜마을 실시간 상담하기</h2>
            <p>답변을 기다리기 답답하시다면?<br>지금 바로 팜마을 채팅으로 빠르고 따뜻한 상담을 받아보세요.</p>
            <button class="btn-chat" onclick="location.href='chat.html'">채팅방으로 이동하기 🚀</button>
        </div>

        <!-- 🌟 질문있어요 게시판 -->
        <div>
            <div class="qna-header">
                <h3 style="color:#222; font-size:1.3rem;">동네 이웃 질문 게시판</h3>
                <button class="btn-write" onclick="toggleWriteForm()">✏️ 질문 작성하기</button>
            </div>

            <!-- 글쓰기 폼 (기본 숨김) -->
            <div id="writeForm" class="qna-write-box">
                <h4 style="margin-bottom: 15px; color: #333;">어떤 점이 궁금하신가요?</h4>
                <input type="text" id="qTitle" placeholder="제목을 입력해주세요" required>
                <textarea id="qContent" placeholder="궁금한 내용을 자세히 적어주시면 빠르게 답변해 드립니다!" required></textarea>
                <button class="btn-submit" onclick="submitQuestion()">질문 등록하기</button>
            </div>

            <!-- 질문 목록이 그려지는 곳 -->
            <div id="qnaList">
                <div style="text-align:center; padding:50px; color:#888;">서버에서 질문 목록을 불러오는 중입니다... ⏳</div>
            </div>
        </div>
    </div>

    <script>
        // 페이지가 열리면 질문 목록을 자동으로 불러옵니다.
        document.addEventListener("DOMContentLoaded", function() {
            loadQnaList();
        });

        // 글쓰기 폼 열고 닫기 + 로그인 체크
        function toggleWriteForm() {
            fetch('/api/user').then(res => res.json()).then(data => {
                if(!data.loggedIn) {
                    alert('로그인한 회원만 질문을 남길 수 있습니다. 로그인 페이지로 이동합니다.');
                    location.href = 'login.html';
                    return;
                }
                const form = document.getElementById('writeForm');
                form.style.display = form.style.display === 'block' ? 'none' : 'block';
            });
        }

        // 🌟 1. 질문 DB에 저장하기
        function submitQuestion() {
            const title = document.getElementById('qTitle').value;
            const content = document.getElementById('qContent').value;
            if(!title || !content) { alert('제목과 내용을 모두 입력해주세요.'); return; }

            fetch('/api/qna', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content })
            })
            .then(res => res.json())
            .then(result => {
                alert(result.message);
                if(result.success) {
                    document.getElementById('qTitle').value = '';
                    document.getElementById('qContent').value = '';
                    document.getElementById('writeForm').style.display = 'none';
                    loadQnaList(); // 리스트 새로고침
                }
            });
        }

        // 🌟 2. 질문 리스트 서버에서 불러오기
        function loadQnaList() {
            fetch('/api/qna')
            .then(res => res.json())
            .then(result => {
                const listArea = document.getElementById('qnaList');
                listArea.innerHTML = '';

                if(result.data.length === 0) {
                    listArea.innerHTML = '<div style="text-align:center; padding:50px; background:#fff; border-radius:12px; border:1px solid #eee; color:#888; font-weight:600;">아직 등록된 질문이 없습니다.<br>궁금한 점이 있다면 첫 번째 질문을 남겨보세요!</div>';
                    return;
                }

                result.data.forEach(item => {
                    const date = new Date(item.created_at).toLocaleDateString();
                    
                    // 관리자 답변이 있는 경우
                    let replyHtml = '';
                    if(item.reply) {
                        replyHtml = `
                            <div class="qna-reply">
                                <div class="qna-reply-title"><span>🧑‍🌾</span> 팜마을 관리자 답변</div>
                                <div class="qna-reply-content">${item.reply.replace(/\n/g, '<br>')}</div>
                            </div>
                        `;
                    } 
                    // 답변이 없고, 현재 접속자가 '관리자'인 경우 답변 폼 노출
                    else if(result.isAdmin) {
                        replyHtml = `
                            <div class="admin-reply-form">
                                <div style="font-weight:800; color:#4B9AD2; font-size:0.9rem;">🛠️ 관리자 답변 작성</div>
                                <textarea id="replyInput_${item.id}" class="admin-reply-input" placeholder="이 질문에 대한 답변을 작성하세요..."></textarea>
                                <button class="btn-reply" onclick="submitReply(${item.id})">✅ 답변 등록하기</button>
                            </div>
                        `;
                    }

                    const html = `
                        <div class="qna-item">
                            <div class="qna-title">${item.title}</div>
                            <div class="qna-meta">🧑‍🌾 ${item.nickname} | 📅 ${date}</div>
                            <div class="qna-content">${item.content.replace(/\n/g, '<br>')}</div>
                            ${replyHtml}
                        </div>
                    `;
                    listArea.insertAdjacentHTML('beforeend', html);
                });
            });
        }

        // 🌟 3. 관리자 전용 답변 달기
        function submitReply(qnaId) {
            const replyContent = document.getElementById(`replyInput_${qnaId}`).value;
            if(!replyContent) { alert('답변 내용을 입력해주세요.'); return; }

            fetch(`/api/qna/${qnaId}/reply`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reply: replyContent })
            })
            .then(res => res.json())
            .then(result => {
                alert(result.message);
                if(result.success) loadQnaList();
            });
        }
    </script>
</body>
</html>
