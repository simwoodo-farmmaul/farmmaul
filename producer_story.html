<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>팜마을 - 생산자 이야기</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        :root { --primary-green: #87B32E; --primary-orange: #E69138; --primary-blue: #4B9AD2; --bg-color: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; word-break: keep-all; }
        body { background-color: var(--bg-color); color: #333; padding-bottom: 80px; }
        a { text-decoration: none; color: inherit; }

        .header { background: rgba(255,255,255,0.95); backdrop-filter: blur(5px); border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .header-inner { max-width: 800px; margin: 0 auto; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-icon { font-size: 1.2rem; cursor: pointer; font-weight: 900; }
        .title { font-weight: 900; font-size: 1.2rem; color: var(--primary-green); }

        .container { max-width: 800px; margin: 0 auto; background: #fff; min-height: 100vh; border: 1px solid #eee; position: relative; }

        .cover-img { width: 100%; height: 200px; object-fit: cover; background: #ddd; }
        .profile-section { padding: 0 20px 30px; text-align: center; border-bottom: 10px solid #f1f3f5; }
        .profile-img { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 5px solid #fff; margin: -55px auto 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .producer-name { font-size: 1.5rem; font-weight: 900; margin-bottom: 5px; }
        .producer-short { font-size: 0.95rem; color: #666; margin-bottom: 15px; }
        .stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; font-weight: 800; font-size: 0.9rem; }
        .stats span { color: var(--primary-orange); font-size: 1.1rem; }
        
        .tabs { display: flex; border-bottom: 1px solid #eee; }
        .tab { flex: 1; text-align: center; padding: 15px; font-weight: 800; cursor: pointer; color: #888; }
        .tab.active { color: #222; border-bottom: 3px solid var(--primary-green); }

        .blog-content { padding: 30px 20px; }
        .post-card { margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 30px; }
        .post-card:last-child { border-bottom: none; }
        .post-date { font-size: 0.85rem; font-weight: 700; color: #999; margin-bottom: 10px; display: block; }
        .post-title { font-size: 1.3rem; font-weight: 900; margin-bottom: 15px; }
        .post-img { width: 100%; border-radius: 15px; margin-bottom: 15px; object-fit: cover; max-height: 400px; }
        .post-text { font-size: 1rem; color: #444; line-height: 1.7; }
        .post-tags { margin-top: 15px; display: flex; gap: 8px; flex-wrap: wrap; }
        .post-tags span { background: #f0f8ff; color: var(--primary-blue); padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 800; }

        /* ★ 신규: 플로팅 글쓰기 버튼 ★ */
        .btn-write-float { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: var(--primary-green); color: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px 20px rgba(135,179,46,0.5); font-size: 1.8rem; cursor: pointer; z-index: 1000; transition: 0.2s; }
        .btn-write-float:hover { transform: scale(1.1); background: #719626; }

        @media (max-width: 768px) {
            .container { border: none; }
            .btn-write-float { bottom: 20px; right: 20px; width: 55px; height: 55px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <a href="index.html" class="btn-icon">←</a>
            <div class="title">생산자 이야기</div>
            <div style="width: 24px;"></div>
        </div>
    </div>

    <div class="container">
        <img src="https://images.unsplash.com/photo-1595841696677-6489ff3f8cd1?q=80&w=800&auto=format&fit=crop" class="cover-img">
        <div class="profile-section">
            <img src="https://images.unsplash.com/photo-1605000797499-95a51c5269ae?q=80&w=200&auto=format&fit=crop" class="profile-img">
            <h1 class="producer-name">김평택 농부님 🌿</h1>
            <p class="producer-short">"우리가 먹는다는 생각으로, 농약 없이 정직하게 키웁니다."</p>
            <div class="stats"><div>단골 <span>128</span>명</div><div>게시물 <span>3</span>개</div></div>
        </div>

        <div class="tabs">
            <div class="tab active">농장 일기</div>
            <div class="tab" onclick="alert('판매 상품 목록으로 이동합니다.')">판매 상품</div>
        </div>

        <div class="blog-content">
            <div class="post-card">
                <span class="post-date">2026년 5월 12일</span>
                <h2 class="post-title">아침 이슬을 머금은 찰토마토 수확 현장! 🍅</h2>
                <img src="https://images.unsplash.com/photo-1592924357228-91a4daadcfea?q=80&w=800&auto=format&fit=crop" class="post-img">
                <p class="post-text">오늘 새벽 5시부터 밭에 나와 찰토마토들을 수확했습니다. 화학 비료를 쓰지 않아서 못생겼지만 맛은 최고입니다!</p>
                <div class="post-tags"><span>#찰토마토</span><span>#농장일기</span></div>
            </div>
        </div>
    </div>

    <div class="btn-write-float" onclick="location.href='story_write.html'">✏️</div>
</body>
</html>
