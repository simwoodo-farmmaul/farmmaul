<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팜마을 - 알림판</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: #f8f9fa; color: #333; padding-bottom: 80px; }
        a { text-decoration: none; color: inherit; }

        .header { background: #fff; padding: 15px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .farm-logo { flex: 1; display: flex; align-items: center; gap: 6px; font-weight: 900; font-size: 1.2rem; color: #87B32E; }
        .center-title { flex: 1; text-align: center; font-size: 1.3rem; font-weight: 900; color: #333; white-space: nowrap; }
        .btn-home { flex: 1; text-align: right; font-weight: bold; color: #666; font-size: 1rem; }

        /* 🌟 가로 크기 1000px로 확장 */
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }

        .notice-banner { background: linear-gradient(135deg, #87B32E, #6b9122); border-radius: 15px; padding: 30px; text-align: center; color: white; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(135, 179, 46, 0.3); }
        .notice-banner h2 { font-size: 1.5rem; font-weight: 900; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .notice-banner p { font-size: 1rem; line-height: 1.6; opacity: 0.95; margin-bottom: 0; }

        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eaeaea; padding-bottom: 15px; }
        .list-title { font-size: 1.3rem; font-weight: 900; color: #222; }
        .btn-write { display: none; background: #E69138; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-write:hover { background: #d84315; }

        .write-box { display: none; background: #fff; padding: 25px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .write-box input, .write-box textarea { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; font-size: 1rem; outline: none; }
        .write-box textarea { height: 150px; resize: none; }
        .btn-submit { background: #87B32E; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }

        .notice-item { background: #fff; border-radius: 12px; padding: 25px; border: 1px solid #eee; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); display: flex; flex-direction: column; }
        .notice-title { font-size: 1.2rem; font-weight: 900; color: #222; margin-bottom: 8px; }
        .notice-meta { font-size: 0.9rem; color: #888; font-weight: 600; margin-bottom: 15px; }
        .notice-content { font-size: 1.05rem; color: #444; line-height: 1.6; white-space: pre-wrap; padding-top: 15px; border-top: 1px dashed #eee; display: none; }
        .notice-content.expanded { display: block; }
        
        .toggle-btn { background: #f8f9fa; border: 1px solid #ddd; border-radius: 8px; padding: 8px; text-align: center; color: #555; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; align-self: flex-end; margin-top: 15px; display: none; }

        /* 🌟 모바일 화면 테두리 꽉 차게 넓히기 */
        @media (max-width: 768px) {
            .container { padding: 15px 0; }
            .notice-banner { border-radius: 0; }
            .list-header { padding: 0 15px; }
            .write-box { border-radius: 0; border-left: none; border-right: none; }
            .notice-item { border-radius: 0; border-left: none; border-right: none; }
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="farm-logo"><img src="farmmaul.webp" style="height: 24px;" onerror="this.style.display='none'"> 팜마을</a>
        <div class="center-title">📢 알림판</div>
        <a href="index.html" class="btn-home">홈으로</a>
    </div>

    <div class="container">
        <div class="notice-banner">
            <h2>📢 팜마을 최신 소식</h2>
            <p>팜마을의 새로운 공지사항과 이벤트 소식을<br>가장 먼저 확인해 보세요!</p>
        </div>

        <div class="list-header">
            <div class="list-title">전체 공지사항</div>
            <button id="adminWriteBtn" class="btn-write" onclick="toggleWriteForm()">✏️ 공지 작성 (관리자)</button>
        </div>

        <div id="writeForm" class="write-box">
            <h4 style="margin-bottom: 15px; color: #333;">새로운 공지사항 작성</h4>
            <input type="text" id="nTitle" placeholder="공지 제목을 입력해주세요" required>
            <textarea id="nContent" placeholder="공지 내용을 자세히 적어주세요." required></textarea>
            <button class="btn-submit" onclick="submitNotice()">공지 등록하기</button>
        </div>

        <div id="noticeListArea">
            <div style="text-align:center; padding:50px; color:#888;">서버에서 공지사항을 불러오는 중입니다... ⏳</div>
        </div>
    </div>

    <script>
        let isAdminGlobal = false;

        document.addEventListener("DOMContentLoaded", function() {
            fetch('/api/user').then(res => res.json()).then(data => {
                if(data.loggedIn) {
                    const adminEmails = ['greenpic@naver.com', 'simwoodo@naver.com'];
                    if(adminEmails.includes(data.user.email) && !data.user.kakaoId) {
                        isAdminGlobal = true;
                        document.getElementById('adminWriteBtn').style.display = 'block';
                    }
                }
                loadNotices(); 
            });
        });

        function toggleWriteForm() {
            const form = document.getElementById('writeForm');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        }

        function submitNotice() {
            const title = document.getElementById('nTitle').value;
            const content = document.getElementById('nContent').value;
            if(!title) { alert('제목을 입력해주세요.'); return; }

            fetch('/api/notices', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content })
            })
            .then(res => res.json())
            .then(result => {
                alert(result.message);
                if(result.success) {
                    document.getElementById('nTitle').value = '';
                    document.getElementById('nContent').value = '';
                    document.getElementById('writeForm').style.display = 'none';
                    loadNotices(); 
                }
            });
        }

        function loadNotices() {
            fetch('/api/notices')
            .then(res => res.json())
            .then(result => {
                const listArea = document.getElementById('noticeListArea');
                listArea.innerHTML = '';

                if(result.data.length === 0) {
                    listArea.innerHTML = '<div style="text-align:center; padding:50px; background:#fff; border-radius:12px; border:1px solid #eee; color:#888; font-weight:600;">등록된 공지사항이 없습니다.</div>';
                    return;
                }

                result.data.forEach(item => {
                    const date = new Date(item.created_at).toLocaleDateString();
                    let contentHtml = '';
                    let toggleBtn = '';
                    if(item.content && item.content.trim() !== '') {
                        contentHtml = `<div id="content_${item.id}" class="notice-content">${item.content.replace(/\n/g, '<br>')}</div>`;
                        toggleBtn = `<div class="toggle-btn" onclick="toggleContent(${item.id}, this)">상세 내용 보기 🔽</div>`;
                    }

                    let deleteBtn = '';
                    if(isAdminGlobal) {
                        deleteBtn = `<button class="btn-delete" style="display:block;" onclick="deleteNotice(${item.id})">이 공지 삭제하기</button>`;
                    }

                    const html = `
                        <div class="notice-item">
                            <div class="notice-title">📢 ${item.title}</div>
                            <div class="notice-meta">📅 ${date}</div>
                            ${toggleBtn}
                            ${contentHtml}
                            ${deleteBtn}
                        </div>
                    `;
                    listArea.insertAdjacentHTML('beforeend', html);
                });
            });
        }

        function toggleContent(id, btn) {
            const contentDiv = document.getElementById(`content_${id}`);
            if (contentDiv.classList.contains('expanded')) {
                contentDiv.classList.remove('expanded');
                btn.innerText = '상세 내용 보기 🔽';
            } else {
                contentDiv.classList.add('expanded');
                btn.innerText = '내용 접기 🔼';
            }
        }

        function deleteNotice(id) {
            if(confirm('정말 이 공지사항을 삭제하시겠습니까?')) {
                fetch(`/api/notices/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(result => {
                    alert(result.message);
                    if(result.success) loadNotices();
                });
            }
        }
    </script>
</body>
</html>
