<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팜마을 - 알림판</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: #f8f9fa; color: #333; padding-bottom: 80px; }
        a { text-decoration: none; color: inherit; }

        .header { background: #fff; padding: 15px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .farm-logo { flex: 1; display: flex; align-items: center; gap: 6px; font-weight: 900; font-size: 1.2rem; color: #87B32E; }
        .center-title { flex: 1; text-align: center; font-size: 1.3rem; font-weight: 900; color: #333; white-space: nowrap; }
        .btn-home { flex: 1; text-align: right; font-weight: bold; color: #666; font-size: 1rem; }

        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }

        .notice-banner { background: linear-gradient(135deg, #87B32E, #6b9122); border-radius: 15px; padding: 30px; text-align: center; color: white; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(135, 179, 46, 0.3); }
        .notice-banner h2 { font-size: 1.5rem; font-weight: 900; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .notice-banner p { font-size: 1rem; line-height: 1.6; opacity: 0.95; margin-bottom: 0; }

        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eaeaea; padding-bottom: 15px; }
        .list-title { font-size: 1.3rem; font-weight: 900; color: #222; }
        .btn-write { display: none; background: #E69138; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-write:hover { background: #d84315; }

        .write-box { display: none; background: #fff; padding: 25px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .write-box input[type="text"], .write-box textarea { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; font-size: 1rem; outline: none; }
        .write-box textarea { height: 150px; resize: none; }
        
        /* 🌟 새로 추가된 체크박스 라벨 스타일 */
        .pin-label { display: block; margin-bottom: 15px; font-weight: 900; cursor: pointer; color: #E69138; font-size: 1.05rem; }
        
        .btn-submit { background: #87B32E; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }

        .notice-item { background: #fff; border-radius: 12px; padding: 25px; border: 1px solid #eee; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); display: flex; flex-direction: column; }
        .notice-title { font-size: 1.2rem; font-weight: 900; color: #222; margin-bottom: 8px; }
        .notice-meta { font-size: 0.9rem; color: #888; font-weight: 600; margin-bottom: 15px; }
        .notice-content { font-size: 1.05rem; color: #444; line-height: 1.6; white-space: pre-wrap; padding-top: 15px; border-top: 1px dashed #eee; display: none; }
        .notice-content.expanded { display: block; }
        
        .toggle-btn { background: #f8f9fa; border: 1px solid #ddd; border-radius: 8px; padding: 8px; text-align: center; color: #555; font-weight: bold; cursor: pointer; margin-top: 10px; }

        .author-actions { margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-action { padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; margin-left: 5px; font-size: 0.9rem; }
        .btn-edit { background: #4B9AD2; color: white; }
        .btn-delete { background: #ff4d4d; color: white; }
        .pin-switch { font-weight: 900; color: #E69138; cursor: pointer; }

        .notice-comments-wrap { margin-top: 20px; background: #f9fbf9; padding: 20px; border-radius: 8px; border: 1px solid #e0e0e0; display: none; }
        .notice-comments-wrap.expanded { display: block; }
        .comment-item { border-bottom: 1px dashed #ddd; padding-bottom: 10px; margin-bottom: 10px; }
        .comment-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .comment-author { font-weight: 900; font-size: 0.9rem; color: #2e7d32; }
        .comment-text { font-size: 0.95rem; color: #555; margin-top: 4px; }
        .comment-date { font-size: 0.8rem; color: #aaa; margin-top: 4px; }
        .comment-input-wrap { display: flex; gap: 10px; margin-top: 15px; }
        .comment-input-wrap input { flex: 1; padding: 10px 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 0.95rem; outline: none; }
        .comment-input-wrap button { background: #87B32E; color: #fff; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: #fff; width: 90%; max-width: 600px; padding: 25px; border-radius: 12px; }
        .modal-box input, .modal-box textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; outline: none; }
        .modal-box textarea { height: 150px; resize: vertical; }
        .modal-btns { text-align: right; }
        .modal-btns button { padding: 8px 15px; margin-left: 5px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-cancel { background: #ccc; color: #333; }
        .btn-save { background: #87B32E; color: #fff; }

        @media (max-width: 768px) {
            .container { padding: 15px 0; }
            .notice-banner { border-radius: 0; }
            .list-header { padding: 0 15px; }
            .write-box { border-radius: 0; border-left: none; border-right: none; }
            .notice-item { border-radius: 0; border-left: none; border-right: none; }
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="farm-logo"><img src="farmmaul.webp" style="height: 24px;" onerror="this.style.display='none'"> 팜마을</a>
        <div class="center-title">📢 알림판</div>
        <a href="index.html" class="btn-home">홈으로</a>
    </div>

    <div class="container">
        <div class="notice-banner">
            <h2>📢 팜마을 최신 소식</h2>
            <p>팜마을의 새로운 공지사항과 이벤트 소식을<br>가장 먼저 확인해 보세요!</p>
        </div>

        <div class="list-header">
            <div class="list-title">전체 공지사항</div>
            <button id="adminWriteBtn" class="btn-write" onclick="toggleWriteForm()">✏️ 공지 작성 (관리자)</button>
        </div>

        <div id="writeForm" class="write-box">
            <h4 style="margin-bottom: 15px; color: #333;">새로운 공지사항 작성</h4>
            <input type="text" id="nTitle" placeholder="공지 제목을 입력해주세요" required>
            <textarea id="nContent" placeholder="공지 내용을 자세히 적어주세요." required></textarea>
            
            <label class="pin-label">
                <input type="checkbox" id="nPinned" style="width:auto; margin-right:5px;"> 📌 이 공지를 메인화면 상단 알림으로 고정하기
            </label>

            <button class="btn-submit" onclick="submitNotice()">공지 등록하기</button>
        </div>

        <div id="noticeListArea">
            <div style="text-align:center; padding:50px; color:#888;">서버에서 공지사항을 불러오는 중입니다... ⏳</div>
        </div>
    </div>

    <div id="editNoticeModal" class="modal-overlay">
        <div class="modal-box">
            <h3 style="margin-bottom: 15px; color:#333;">✏️ 공지사항 수정하기</h3>
            <input type="text" id="editNoticeTitle" placeholder="제목을 입력하세요">
            <textarea id="editNoticeContent" placeholder="내용을 입력하세요"></textarea>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeEditNoticeModal()">취소</button>
                <button class="btn-save" onclick="saveEditNotice()">저장하기</button>
            </div>
        </div>
    </div>

    <script>
        let isAdminGlobal = false;
        let globalNoticeList = [];
        let editingNoticeId = null;

        document.addEventListener("DOMContentLoaded", function() {
            fetch('/api/user').then(res => res.json()).then(data => {
                if(data.loggedIn) {
                    const adminEmails = ['greenpic@naver.com', 'simwoodo@naver.com'];
                    if(adminEmails.includes(data.user.email) && !data.user.kakaoId) {
                        isAdminGlobal = true;
                        document.getElementById('adminWriteBtn').style.display = 'block';
                    }
                }
                loadNotices(); 
            });
        });

        function toggleWriteForm() {
            const form = document.getElementById('writeForm');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        }

        // 🌟 작성 시 체크박스 상태값도 서버로 보냄
        function submitNotice() {
            const title = document.getElementById('nTitle').value;
            const content = document.getElementById('nContent').value;
            const is_pinned = document.getElementById('nPinned').checked;
            
            if(!title) { alert('제목을 입력해주세요.'); return; }

            fetch('/api/notices', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content, is_pinned })
            })
            .then(res => res.json())
            .then(result => {
                alert(result.message);
                if(result.success) {
                    document.getElementById('nTitle').value = '';
                    document.getElementById('nContent').value = '';
                    document.getElementById('nPinned').checked = false;
                    document.getElementById('writeForm').style.display = 'none';
                    loadNotices(); 
                }
            });
        }

        function loadNotices() {
            fetch('/api/notices')
            .then(res => res.json())
            .then(result => {
                const listArea = document.getElementById('noticeListArea');
                listArea.innerHTML = '';

                if(result.data.length === 0) {
                    listArea.innerHTML = '<div style="text-align:center; padding:50px; background:#fff; border-radius:12px; border:1px solid #eee; color:#888; font-weight:600;">등록된 공지사항이 없습니다.</div>';
                    return;
                }

                globalNoticeList = result.data;

                result.data.forEach(item => {
                    const date = new Date(item.created_at).toLocaleDateString();
                    
                    let contentHtml = '';
                    let toggleBtn = '';
                    if(item.content && item.content.trim() !== '') {
                        contentHtml = `<div id="content_${item.id}" class="notice-content">${item.content.replace(/\n/g, '<br>')}</div>`;
                        toggleBtn = `<div class="toggle-btn" onclick="toggleContent(${item.id}, this)">상세 내용 보기 🔽</div>`;
                    }

                    // 🌟 관리자일 경우 고정 체크박스 및 액션 버튼 추가
                    let actionHtml = '';
                    if(isAdminGlobal) {
                        const pinChecked = item.is_pinned ? 'checked' : '';
                        actionHtml = `
                            <div class="author-actions">
                                <label class="pin-switch">
                                    <input type="checkbox" onchange="togglePin(${item.id}, this.checked)" ${pinChecked}> 📌 메인화면 고정
                                </label>
                                <div>
                                    <button class="btn-action btn-edit" onclick="openEditNoticeModal(${item.id})">✏️ 수정</button>
                                    <button class="btn-action btn-delete" onclick="deleteNotice(${item.id})">🗑️ 삭제</button>
                                </div>
                            </div>
                        `;
                    }

                    const pinBadge = item.is_pinned ? `<span style="color:#E69138; margin-right:5px;">📌</span>` : `📢`;
                    
                    const html = `
                        <div class="notice-item" style="${item.is_pinned ? 'border: 2px solid #E69138;' : ''}">
                            <div class="notice-title">${pinBadge} ${item.title}</div>
                            <div class="notice-meta">📅 ${date}</div>
                            ${toggleBtn}
                            ${contentHtml}
                            ${actionHtml}

                            <div id="commentsWrap_${item.id}" class="notice-comments-wrap">
                                <div style="font-weight: 800; margin-bottom: 15px; font-size: 0.95rem; color: #87B32E;">💬 공지사항 댓글</div>
                                <div id="noticeCommentsList_${item.id}"></div>
                                <div class="comment-input-wrap">
                                    <input type="text" id="noticeCommentInput_${item.id}" placeholder="댓글을 입력해주세요 (로그인 필요)" onkeypress="if(event.key==='Enter') submitNoticeComment(${item.id})">
                                    <button onclick="submitNoticeComment(${item.id})">등록</button>
                                </div>
                            </div>
                        </div>
                    `;
                    listArea.insertAdjacentHTML('beforeend', html);
                    loadNoticeComments(item.id);
                });
            });
        }

        // 🌟 고정 체크박스 상태 변경 서버 전송 함수
        function togglePin(id, is_pinned) {
            fetch(`/api/notices/${id}/pin`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_pinned: is_pinned })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    loadNotices(); // 메인화면과 리스트 정렬을 위해 다시 로드
                }
            });
        }

        function toggleContent(id, btn) {
            const contentDiv = document.getElementById(`content_${id}`);
            const commentsWrap = document.getElementById(`commentsWrap_${id}`);
            if (contentDiv.classList.contains('expanded')) {
                contentDiv.classList.remove('expanded');
                commentsWrap.classList.remove('expanded');
                btn.innerText = '상세 내용 보기 🔽';
            } else {
                contentDiv.classList.add('expanded');
                commentsWrap.classList.add('expanded');
                btn.innerText = '내용 접기 🔼';
            }
        }

        function openEditNoticeModal(id) {
            const item = globalNoticeList.find(n => n.id === id);
            if (!item) return;
            editingNoticeId = id;
            document.getElementById('editNoticeTitle').value = item.title;
            document.getElementById('editNoticeContent').value = item.content;
            document.getElementById('editNoticeModal').style.display = 'flex';
        }

        function closeEditNoticeModal() {
            document.getElementById('editNoticeModal').style.display = 'none';
            editingNoticeId = null;
        }

        function saveEditNotice() {
            const newTitle = document.getElementById('editNoticeTitle').value;
            const newContent = document.getElementById('editNoticeContent').value;
            if(!newTitle || !newContent) { alert('제목과 내용을 모두 입력해주세요.'); return; }

            fetch(`/api/notices/${editingNoticeId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: newTitle, content: newContent })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                if(data.success) {
                    closeEditNoticeModal();
                    loadNotices();
                }
            });
        }

        function deleteNotice(id) {
            if(confirm('정말 이 공지사항을 삭제하시겠습니까?')) {
                fetch(`/api/notices/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(result => {
                    alert(result.message);
                    if(result.success) loadNotices();
                });
            }
        }

        function loadNoticeComments(postId) {
            fetch(`/api/notices/comments/${postId}`)
            .then(res => res.json())
            .then(result => {
                const list = document.getElementById(`noticeCommentsList_${postId}`);
                list.innerHTML = '';
                if (result.success && result.data.length > 0) {
                    result.data.forEach(comment => {
                        const date = new Date(comment.created_at).toLocaleString();
                        list.innerHTML += `
                            <div class="comment-item">
                                <div class="comment-author">🧑‍🌾 ${comment.author} <span class="comment-date" style="font-weight:normal; margin-left:8px;">${date}</span></div>
                                <div class="comment-text">${comment.content}</div>
                            </div>
                        `;
                    });
                } else {
                    list.innerHTML = '<div style="color:#aaa; font-size:0.9rem; margin-bottom:10px;">아직 작성된 댓글이 없습니다.</div>';
                }
            });
        }

        function submitNoticeComment(postId) {
            const inputField = document.getElementById(`noticeCommentInput_${postId}`);
            const content = inputField.value.trim();
            if (!content) { alert('댓글 내용을 입력해주세요.'); return; }

            fetch('/api/notices/comments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ post_id: postId, content: content })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    inputField.value = '';
                    loadNoticeComments(postId); 
                } else {
                    alert(data.message);
                    if (data.message === '로그인이 필요합니다.') {
                        location.href = 'login.html';
                    }
                }
            });
        }
    </script>
</body>
</html>
