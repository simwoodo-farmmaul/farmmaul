<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>팜마을 - 로그인 및 회원가입</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        
        :root { 
            --primary-green: #87B32E; 
            --primary-orange: #E69138; 
            --primary-blue: #4B9AD2; 
            --bg-color: #f4f7f6; 
            --kakao-yellow: #FEE500; 
            --kakao-text: #3C1E1E; 
        }
        
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        
        /* 🌟 전체 여백 축소 */
        body { background: var(--bg-color); margin: 0; padding: 16px; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }

        /* 🌟 로고 하단 간격 축소 (30px -> 20px) */
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-text {
            font-family: 'Jua', sans-serif;
            font-size: 2.8rem;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #87B32E 0%, #4a7c1b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            letter-spacing: -1px;
            filter: drop-shadow(0px 3px 4px rgba(135, 179, 46, 0.2));
        }
        .logo-leaf { font-size: 2.2rem; -webkit-text-fill-color: initial; }
        .logo-sub { font-size: 0.95rem; font-weight: 700; color: #666; margin-top: 5px; }

        .auth-box { background: #fff; width: 100%; max-width: 450px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
        
        /* 🌟 탭 위아래 여백 축소 (18px -> 14px) */
        .auth-tabs { display: flex; border-bottom: 2px solid #eee; }
        .auth-tab { flex: 1; padding: 14px 0; text-align: center; font-size: 1.1rem; font-weight: 800; color: #aaa; cursor: pointer; transition: 0.2s; background: #fafafa; }
        .auth-tab.active { color: var(--primary-green); background: #fff; border-bottom: 3px solid var(--primary-green); margin-bottom: -2px; }

        /* 🌟 내부 폼 패딩 축소 (35px -> 25px) */
        .form-container { padding: 25px 20px; display: none; }
        .form-container.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 🌟 입력창 간격 및 내부 여백 축소 (15px -> 10px, 12px) */
        .input-group { margin-bottom: 10px; width: 100%; position: relative; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 1rem; outline: none; transition: border-color 0.2s; }
        .input-group input:focus { border-color: var(--primary-green); box-shadow: 0 0 0 3px rgba(135,179,46,0.1); }
        .input-group input::placeholder { color: #bbb; }

        .password-toggle { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 1.2rem; color: #999; cursor: pointer; user-select: none; }

        /* 🌟 버튼 여백 축소 (15px -> 13px) */
        .btn-submit { width: 100%; padding: 13px; background: var(--primary-green); color: #fff; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 900; cursor: pointer; transition: 0.2s; margin-top: 8px; display: block; }
        .btn-submit:hover { background: #76a025; }
        
        .btn-kakao { display: flex; width: 100%; padding: 13px; background: var(--kakao-yellow); color: var(--kakao-text); border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 900; cursor: pointer; justify-content: center; align-items: center; gap: 10px; transition: 0.2s; text-decoration: none; }
        .btn-kakao:hover { background: #f4dc00; }
        .kakao-icon { font-size: 1.3rem; }

        /* 🌟 구분선 상하 여백 축소 (25px -> 18px) */
        .divider { display: flex; align-items: center; text-align: center; color: #999; font-size: 0.85rem; font-weight: 700; margin: 18px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #eee; }
        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }

        /* 🌟 하단 링크 간격 축소 (20px -> 15px) */
        .extra-links { display: flex; justify-content: center; gap: 15px; margin-top: 15px; font-size: 0.85rem; font-weight: 700; color: #888; }
        .extra-links a { color: #888; text-decoration: none; cursor: pointer; }
        .extra-links a:hover { color: #333; text-decoration: underline; }

        /* 🌟 모바일 전용 초밀착 셋팅 (폭 480px 이하일 때 더 좁힘) */
        @media (max-width: 480px) {
            .auth-box { border-radius: 15px; }
            .form-container { padding: 20px 15px; }
            .logo-text { font-size: 2.2rem; }
            .logo-leaf { font-size: 1.8rem; }
            body { padding: 10px; align-items: flex-start; margin-top: 15px; }
        }
    </style>
</head>
<body>

    <div style="width: 100%; max-width: 450px;">
        <div class="logo-container">
            <a href="index.html" class="logo-text"><span class="logo-leaf">🌱</span>팜마을</a>
            <div class="logo-sub">우리 동네 신선한 먹거리 직거래</div>
        </div>

        <div class="auth-box">
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login">로그인</div>
                <div class="auth-tab" onclick="location.href='join.html'" id="tab-signup">회원가입</div>
            </div>

            <div class="form-container active" id="form-login">
                <a href="https://kauth.kakao.com/oauth/authorize?client_id=e2676a110b5565e56d2863dd7a9581c8&redirect_uri=https://farmmaul.com/auth/kakao/callback&response_type=code" class="btn-kakao">
                    <span class="kakao-icon">💬</span> 카카오로 3초만에 시작하기
                </a>
                
                <div class="divider">또는 이메일로 로그인</div>

                <form id="loginForm">
                    <div class="input-group">
                        <input type="email" id="loginEmail" placeholder="이메일 주소" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="loginPassword" placeholder="비밀번호" required>
                        <span class="password-toggle" onclick="togglePass('loginPassword', this)">👁️</span>
                    </div>
                    <button type="submit" class="btn-submit">로그인</button>
                </form>

                <div class="extra-links">
                    <a onclick="alert('비밀번호 찾기 화면이 열립니다.')">비밀번호 찾기</a>
                    <span>|</span>
                    <a href="join.html">이메일로 회원가입</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePass(inputId, toggleIcon) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                toggleIcon.style.color = "#87B32E";
            } else {
                input.type = "password";
                toggleIcon.style.color = "#999";
            }
        }

        // 이메일 로그인 요청 연동
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert(data.message);
                    location.href = 'index.html'; // 메인화면으로 진입!
                } else {
                    alert(data.message);
                }
            })
            .catch(err => alert('로그인 처리 중 서버 통신 에러가 발생했습니다.'));
        });
    </script>
</body>
</html>
