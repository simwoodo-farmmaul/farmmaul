<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팜마을 - 총괄 마스터 관리자</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        
        :root { 
            --master-dark: #1a1c23; --master-green: #87B32E; --master-blue: #4B9AD2; 
            --master-orange: #E69138; --master-red: #ff5e62; --bg-light: #f4f7f6; 
        }
        
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-light); margin: 0; padding: 0; color: #333; display: flex; height: 100vh; overflow: hidden; }

        /* 좌측 사이드바 */
        .sidebar { width: 260px; background: var(--master-dark); color: #fff; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 25px 20px; font-family: 'Jua', sans-serif; font-size: 1.8rem; color: var(--master-green); border-bottom: 1px solid #333; text-align: center; }
        .sidebar-header span { color: #fff; font-size: 1rem; font-family: 'Pretendard', sans-serif; font-weight: 800; display: block; margin-top: 5px; }
        
        .menu-list { list-style: none; padding: 10px 0; margin: 0; overflow-y: auto; flex: 1; }
        .menu-item { padding: 12px 25px; cursor: pointer; font-weight: 700; transition: 0.2s; color: #adb5bd; display: flex; align-items: center; gap: 10px; border-left: 4px solid transparent; font-size: 0.95rem; }
        .menu-item:hover, .menu-item.active { background: #2d2f39; color: #fff; border-left-color: var(--master-green); }

        /* 우측 메인 콘텐츠 */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; min-width: 0; }
        .top-bar { background: #fff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); position: sticky; top: 0; z-index: 10; }
        .page-title-text { font-size: 1.3rem; font-weight: 900; color: #111; margin: 0; }
        .admin-profile { display: flex; align-items: center; gap: 10px; font-weight: 800; }
        .logout-btn { border: 1px solid #ddd; background: #fff; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .logout-btn:hover { background: #f1f3f5; }

        /* 뷰 컨트롤 */
        .view-section { padding: 30px; display: none; }
        .view-section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 공통 카드 및 테이블 */
        .card { background: #fff; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #eee; margin-bottom: 25px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card-title { font-size: 1.15rem; font-weight: 900; color: #333; margin: 0; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px 15px; font-size: 0.9rem; color: #888; border-bottom: 2px solid #f1f3f5; background: #fcfcfc; }
        td { padding: 15px; border-bottom: 1px solid #f1f3f5; font-size: 0.95rem; font-weight: 600; vertical-align: middle; }
        tr:hover td { background: #fdfdfd; }
        
        .badge { padding: 5px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 800; }
        .bg-green { background: #e8f5e9; color: #2e7d32; }
        .bg-orange { background: #fff3e0; color: #ef6c00; }
        .bg-red { background: #ffebee; color: #c62828; }
        .bg-blue { background: #e3f2fd; color: #1565c0; }
        .bg-gray { background: #f1f3f5; color: #666; }

        .action-btns { display: flex; gap: 5px; }
        .btn-sm { padding: 6px 12px; border: 1px solid #ddd; background: #fff; border-radius: 6px; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-sm:hover { background: #eee; }
        .btn-sm.profile { color: var(--master-blue); border-color: #bbdefb; }
        .btn-sm.profile:hover { background: #e3f2fd; }
        .btn-sm.warn { color: #c62828; border-color: #ffcdd2; }
        .btn-sm.warn:hover { background: #ffebee; }
        
        /* 요약 카드 */
        .master-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: #fff; padding: 25px; border-radius: 15px; border: 1px solid #eee; }
        .stat-label { font-size: 0.9rem; font-weight: 800; color: #888; margin-bottom: 10px; display: block; }
        .stat-value { font-size: 1.8rem; font-weight: 900; color: #222; }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">🌱 팜마을<span>통합 마스터 관리자</span></div>
        <ul class="menu-list">
            <li class="menu-item active" onclick="switchView('dash', this, '📊 전체 현황')">📊 전체 현황</li>
            <li class="menu-item" onclick="switchView('hub', this, '🏪 마을 HUB 관리')">🏪 마을 HUB 관리</li>
            <li class="menu-item" onclick="switchView('farm', this, '🧑‍🌾 생산자(농가) 관리')">🧑‍🌾 생산자(농가) 관리</li>
            <li class="menu-item" onclick="switchView('order', this, '🛒 주문/배송 통합관리')">🛒 주문/배송 통합관리</li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <h1 class="page-title-text" id="header-title">📊 전체 현황</h1>
            <div class="admin-profile">
                <span>총괄 관리자 김영진 님</span>
                <button class="logout-btn">로그아웃</button>
            </div>
        </header>

        <div id="view-dash" class="view-section active">
            <div class="master-stats">
                <div class="stat-box"><span class="stat-label">오늘 총 거래액</span><span class="stat-value">2,450,000원</span></div>
                <div class="stat-box"><span class="stat-label">오늘 신규 주문</span><span class="stat-value">42건</span></div>
                <div class="stat-box"><span class="stat-label">승인 대기 건수</span><span class="stat-value" style="color:var(--master-blue)">3건</span></div>
                <div class="stat-box"><span class="stat-label">누적 회원수</span><span class="stat-value">1,208명</span></div>
            </div>
        </div>

        <div id="view-hub" class="view-section">
            <div class="card">
                <div class="card-header"><h2 class="card-title">등록된 마을 HUB(거점) 목록</h2></div>
                <table>
                    <thead>
                        <tr>
                            <th>HUB 상호명</th>
                            <th>공간 형태</th>
                            <th>거점 주소</th>
                            <th>신청 일시</th>
                            <th>상태</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody id="hubTableBody">
                        <tr><td colspan="6" style="text-align:center; padding:30px;">데이터를 불러오는 중입니다...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="view-farm" class="view-section"><div class="card"><h2 class="card-title">생산자 관리 내역</h2></div></div>
        <div id="view-order" class="view-section"><div class="card"><h2 class="card-title">주문/배송 관리 내역</h2></div></div>

    </main>

    <script>
        // 메뉴 전환 함수
        function switchView(viewId, element, titleText) {
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            
            document.querySelectorAll('.view-section').forEach(view => view.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            
            document.getElementById('header-title').innerText = titleText;
        }

        // 🚀 서버에서 진짜 허브 데이터를 가져와서 표에 그리는 함수
        function loadHubList() {
            fetch('/api/hubs')
            .then(response => response.json())
            .then(result => {
                if(result.success) {
                    const tbody = document.getElementById('hubTableBody');
                    tbody.innerHTML = ''; // 임시 글자 싹 지우기

                    // 저장된 데이터가 하나도 없을 때
                    if(result.data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:30px; color:#888;">아직 접수된 마을 HUB 신청 내역이 없습니다.</td></tr>';
                        return;
                    }

                    // 창고에서 가져온 데이터를 한 줄씩(tr) 만들어서 붙여넣기
                    result.data.forEach(hub => {
                        // 날짜 예쁘게 변환
                        const date = new Date(hub.created_at).toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute:'2-digit' });
                        
                        const row = `
                            <tr>
                                <td style="color:var(--master-blue); font-weight:800;">${hub.hub_name}</td>
                                <td>${hub.hub_type}</td>
                                <td style="font-size:0.85rem; color:#555;">${hub.hub_address}</td>
                                <td style="font-size:0.85rem;">${date}</td>
                                <td><span class="badge bg-blue">신청완료</span></td>
                                <td class="action-btns">
                                    <button class="btn-sm profile" onclick="alert('상세보기 기능은 준비 중입니다.')">보기</button>
                                </td>
                            </tr>
                        `;
                        tbody.insertAdjacentHTML('beforeend', row);
                    });
                }
            })
            .catch(error => {
                console.error('목록 불러오기 실패:', error);
                document.getElementById('hubTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center; color:red;">서버와 연결할 수 없습니다.</td></tr>';
            });
        }

        // 관리자 페이지가 열리면 자동으로 데이터 불러오기 명령!
        document.addEventListener("DOMContentLoaded", function() {
            loadHubList();
        });
    </script>
</body>
</html>
