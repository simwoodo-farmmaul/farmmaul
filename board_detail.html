<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팜마을 - 잔디밭 이야기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background-color: #f9fbf9; color: #333; padding-bottom: 60px; }
        header { background: #fff; padding: 15px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        
        .farm-logo { flex: 1; display: flex; align-items: center; gap: 6px; text-decoration: none; font-weight: 900; font-size: 1.2rem; color: #87B32E; }
        .center-title { flex: 1; text-align: center; font-size: 1.3rem; font-weight: 900; color: #a066c0; white-space: nowrap; }
        .btn-list { flex: 1; text-align: right; text-decoration: none; font-weight: bold; color: #666; }
        
        /* 🌟 가로 길이를 1000px로 넓혔습니다 */
        .main-container { max-width: 1000px; width: 100%; margin: 30px auto; background: white; border-radius: 12px; border: 1px solid #eaeaea; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .detail-header { padding: 25px 30px; border-bottom: 1px solid #f0f0f0; }
        .post-title { font-size: 1.6rem; font-weight: 800; color: #222; margin-bottom: 12px; line-height: 1.4; }
        .post-info { font-size: 0.9rem; color: #666; display: flex; gap: 15px; }
        
        .detail-body { padding: 30px; line-height: 1.7; font-size: 1.05rem; color: #444; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%; background: #000; margin-bottom: 25px; border-radius: 8px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .image-gallery { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .gallery-img { width: 100%; max-height: 500px; object-fit: contain; border-radius: 8px; background: #fafafa; }
        .post-text-content { white-space: pre-wrap; margin-top: 20px; }

        .author-actions { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; text-align: right; display: none; }
        .btn-action { padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; margin-left: 10px; }
        .btn-edit { background: #87B32E; color: white; }
        .btn-delete { background: #ff4d4d; color: white; }
        .admin-badge { display:none; background: #ff4d4d; color: white; font-size: 0.75rem; padding: 3px 8px; border-radius: 12px; vertical-align: middle; margin-right: 10px; }

        /* 👇 잔디밭 댓글 섹션 스타일 */
        .comment-section { background: #fff; padding: 25px 30px; border-top: 5px solid #f9fbf9; }
        .comment-title { font-size: 1.1rem; font-weight: 900; margin-bottom: 15px; color: #a066c0; }
        .comment-input-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .comment-input-box input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; outline: none; }
        .comment-submit { background: #a066c0; color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .comment-list { display: flex; flex-direction: column; gap: 15px; }
        .comment-item { background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
        .comment-author { font-weight: 800; font-size: 0.95rem; margin-bottom: 5px; color: #222; }
        .comment-text { font-size: 0.95rem; color: #555; }
        .comment-date { font-size: 0.8rem; color: #999; margin-top: 5px; text-align: right; }

        /* 🌟 모바일에서 테두리를 화면 끝에 붙여 넓게 보이게 하는 설정 */
        @media (max-width: 768px) {
            .main-container { margin: 0 auto; border-radius: 0; border-left: none; border-right: none; }
            .detail-header { padding: 20px 15px; }
            .detail-body { padding: 20px 15px; }
            .comment-section { padding: 20px 15px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="farm-logo">
            <img src="farmmaul.webp" alt="로고" style="height: 24px; width: auto; border-radius: 4px;" onerror="this.style.display='none'"> 팜마을
        </a>
        <div class="center-title">🌱 잔디밭 이야기</div>
        <a href="board.html" class="btn-list">목록으로</a>
    </header>

    <div class="main-container">
        <div class="detail-header">
            <div class="post-title"><span id="adminBadge" class="admin-badge">관리자 권한</span><span id="postTitle">로딩 중입니다...</span></div>
            <div class="post-info">
                <span id="postAuthor">🧑‍🌾 </span>
                <span id="postDate">📅 </span>
                <span id="postViews" style="color: #a066c0; font-weight: bold;">👁️ 조회수 </span>
            </div>
        </div>
        
        <div class="detail-body">
            <div id="videoArea"></div>
            <div class="image-gallery" id="imageGallery"></div>
            <div class="post-text-content" id="postContent"></div>

            <div class="author-actions" id="authorActions">
                <button class="btn-action btn-edit" id="btnEdit" onclick="editPost()">✏️ 수정하기</button>
                <button class="btn-action btn-delete" onclick="deletePost()">🗑️ 삭제하기</button>
            </div>
        </div>

        <!-- 👇 새롭게 추가된 댓글 입력/목록 창 -->
        <div class="comment-section">
            <div class="comment-title">💬 잔디밭 댓글</div>
            <div class="comment-input-box">
                <input type="text" id="commentInput" placeholder="댓글을 입력해주세요 (로그인 필요)" onkeypress="if(event.key==='Enter') submitComment()">
                <button class="comment-submit" onclick="submitComment()">등록</button>
            </div>
            <div class="comment-list" id="commentList"></div>
        </div>
    </div>

    <script>
        let currentPostId = null;

        function getYoutubeEmbedUrl(url) {
            if(!url) return null;
            let videoId = null;
            if(url.includes('v=')) videoId = url.split('v=')[1].split('&')[0];
            else if(url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1].split('?')[0];
            return videoId ? `https://www.youtube.com/embed/${videoId}` : null;
        }

        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            currentPostId = urlParams.get('id');

            loadPost();
            loadComments(); // 잔디밭 댓글 불러오기 실행!
        });

        function loadPost() {
            fetch(`/api/board/${currentPostId}`)
                .then(res => res.json())
                .then(result => {
                    if(!result.success) { alert('글을 가져올 수 없습니다.'); location.href = 'board.html'; return; }

                    const post = result.data;
                    document.getElementById('postTitle').innerText = post.title;
                    document.getElementById('postAuthor').innerText = `🧑‍🌾 ${post.nickname}`;
                    document.getElementById('postDate').innerText = `📅 ${new Date(post.created_at).toLocaleDateString()}`;
                    document.getElementById('postViews').innerText = `👁️ 조회 ${post.views || 0}`;
                    document.getElementById('postContent').innerText = post.content;

                    if (result.currentUser === post.nickname || result.isAdmin) {
                        document.getElementById('authorActions').style.display = 'block';
                        
                        if (result.currentUser !== post.nickname && result.isAdmin) {
                            document.getElementById('btnEdit').style.display = 'none';
                            document.getElementById('adminBadge').style.display = 'inline-block';
                        }
                    }

                    const embedUrl = getYoutubeEmbedUrl(post.youtube_url);
                    if(embedUrl) document.getElementById('videoArea').innerHTML = `<div class="video-container"><iframe src="${embedUrl}" allowfullscreen></iframe></div>`;

                    let images = [];
                    try { images = JSON.parse(post.images); } catch(e) { images = []; }
                    const gallery = document.getElementById('imageGallery');
                    images.forEach(imgBase64 => {
                        const imgTag = document.createElement('img');
                        imgTag.className = 'gallery-img'; imgTag.src = imgBase64;
                        gallery.appendChild(imgTag);
                    });
                });
        }

        function editPost() { location.href = `board_edit.html?id=${currentPostId}`; }

        function deletePost() {
            if(confirm('정말 이 글을 삭제하시겠습니까?')) {
                fetch(`/api/board/${currentPostId}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(res => {
                    alert(res.message);
                    if(res.success) location.href = 'board.html';
                });
            }
        }

        // 잔디밭 댓글 불러오기 기능
        function loadComments() {
            fetch(`/api/board/comments/${currentPostId}`)
            .then(res => res.json())
            .then(result => {
                const list = document.getElementById('commentList');
                list.innerHTML = '';
                if (result.success && result.data.length > 0) {
                    result.data.forEach(comment => {
                        const date = new Date(comment.created_at).toLocaleString();
                        list.innerHTML += `
                            <div class="comment-item">
                                <div class="comment-author">🧑‍🌾 ${comment.author}</div>
                                <div class="comment-text">${comment.content}</div>
                                <div class="comment-date">${date}</div>
                            </div>
                        `;
                    });
                } else {
                    list.innerHTML = '<div style="color:#888; text-align:center; padding:10px;">아직 작성된 댓글이 없습니다. 첫 댓글을 남겨보세요!</div>';
                }
            });
        }

        // 잔디밭 댓글 등록하기 기능 (비회원 로그인 자동 이동)
        function submitComment() {
            const content = document.getElementById('commentInput').value.trim();
            if (!content) { alert('댓글 내용을 입력해주세요.'); return; }

            fetch('/api/board/comments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ post_id: currentPostId, content: content })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('commentInput').value = '';
                    loadComments(); // 댓글 달면 바로 보이게 새로고침
                } else {
                    alert(data.message);
                    // 🌟 확인을 누르면 로그인 페이지로 강제 이동!
                    if (data.message === '로그인이 필요합니다.') {
                        location.href = 'login.html';
                    }
                }
            });
        }
    </script>
</body>
</html>
